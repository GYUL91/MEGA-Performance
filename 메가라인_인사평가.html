function defaultPeers(empNo) {
  const target = PEOPLE.find(p=>p.empNo===empNo);
  const same = TARGETS.filter(p=>p.empNo!==empNo&&p.dept===target?.dept).map(p=>p.empNo);
  if (same.length) return same.slice(0,2);
  const peers = TARGETS.filter(p=>p.empNo!==empNo);
  const idx = TARGETS.findIndex(p=>p.empNo===empNo);
  return [peers[idx%peers.length]?.empNo||"a101"];
}

// 모든 단계가 배열로 통일 (req 1)
// 본인진단 외 모든 매칭에서 자기 자신 제외
function initAssignments() {
  return TARGETS.map(t => {
    const lead = teamLeadByDept[t.dept];
    // 1차평가: 팀장이 피평가자 본인이면 다른 사람으로 대체 (자기평가 방지)
    const firstEval = (lead && lead !== t.empNo)
      ? lead
      : (t.empNo !== "a078" ? "a078" : "a015"); // a078 본인이면 a015로
    return {
      targetEmpNo: t.empNo,
      "동료평가": defaultPeers(t.empNo).filter(e => e !== t.empNo),
      "1차평가": [firstEval].filter(e => e !== t.empNo),
      "2차평가": ["e003"].filter(e => e !== t.empNo),
      "3차평가": ["e002"].filter(e => e !== t.empNo),
    };
  });
}

// ── 헬퍼 ────────────────────────────────────────────────────────────────────
// 동적 임직원 데이터 (App state와 동기화됨)
let _people = PEOPLE.map(p=>({...p,empStatus:"재직"}));
function getPerson(empNo) { return _people.find(p=>p.empNo===empNo)||{empNo,name:empNo===NONE?"없음":"-",dept:"-",title:"-"}; }
function getRow(progressRows,t,s) { return progressRows.find(r=>r.targetEmpNo===t&&r.stage===s); }
function getEvaluators(assignments,t,s) {
  const v = assignments.find(a=>a.targetEmpNo===t)?.[s]||[];
  return Array.isArray(v)?v.filter(x=>x&&x!==NONE):(v&&v!==NONE?[v]:[]);
}
function hasEvaluator(assignments,t,s) { return getEvaluators(assignments,t,s).length>0; }
function isStageCompleteOrSkipped(assignments,progressRows,t,s) {
  if (!hasEvaluator(assignments,t,s)) return true;
  return getRow(progressRows,t,s)?.status==="완료";
}
// 본인진단 완료 후 동료평가 unlock (req 2)
function isUnlocked(assignments,progressRows,t,s) {
  if (!hasEvaluator(assignments,t,s)) return false;
  const selfRow = getRow(progressRows,t,"본인진단");
  if (!selfRow||selfRow.status!=="완료") return false;
  if (s==="동료평가") return true;
  const idx = STAGES.indexOf(s);
  for (let i=0;i<idx;i++) if (!isStageCompleteOrSkipped(assignments,progressRows,t,STAGES[i])) return false;
  return true;
}
function getEffectiveStatus(assignments,progressRows,row) {
  if (row.stage==="본인진단") return row.status;
  if (!hasEvaluator(assignments,row.targetEmpNo,row.stage)) return "해당없음";
  if (!isUnlocked(assignments,progressRows,row.targetEmpNo,row.stage)) return "권한대기";
  return row.status==="권한대기"?"대기중":row.status;
}
// 현재 유저가 이 타겟에서 가진 최고 단계 rank (req 5 계층 판별용)
function getUserRankForTarget(currentUser,assignments,targetEmpNo) {
  let rank = -1;
  STAGES.forEach(s=>{
    if (getEvaluators(assignments,targetEmpNo,s).includes(currentUser.empNo))
      rank = Math.max(rank, STAGE_RANK[s]);
  });
  return rank;
}
// 역량별: 평가자별 문항 합산 → 그룹 평균 반환 (essay 지원)
function getCompStageScore(scores,progressRows,targetEmpNo,stage,compTitle,questions,isEssay=false) {
  const isSD = stage==="본인진단";
  const sdRow = getRow(progressRows,targetEmpNo,"본인진단");
  const submitted = isSD
    ? (sdRow?.status==="완료"?[targetEmpNo]:[])
    : (getRow(progressRows,targetEmpNo,stage)?.completedBy||[]);
  if (!submitted.length) return null;
  if (isEssay) {
    const submitted = isSD ? (sdRow?.status==="완료"?[targetEmpNo]:[]) : (getRow(progressRows,targetEmpNo,stage)?.completedBy||[]);
    if (!submitted.length) return null;
    const vals = submitted.map(ev=>scores[SK(targetEmpNo,stage,ev,compTitle,"essay")]).filter(v=>v!=null);
    return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  }
  const sums = submitted.map(ev=>{
    const vals = (questions||[]).map((_,qi)=>scores[SK(targetEmpNo,stage,ev,compTitle,qi)]).filter(v=>v!=null);
    return vals.length===(questions||[]).length ? vals.reduce((a,b)=>a+b,0) : null;
  }).filter(v=>v!==null);
  return sums.length ? +(sums.reduce((a,b)=>a+b,0)/sums.length).toFixed(1) : null;
}
// 평가자 한 명의 역량별 합산 (관리자 상세용)
function getEvCompSum(scores,targetEmpNo,stage,evNo,compTitle,questions) {
  const vals = (questions||[]).map((_,qi)=>scores[SK(targetEmpNo,stage,evNo,compTitle,qi)]).filter(v=>v!=null);
  return vals.length===(questions||[]).length ? vals.reduce((a,b)=>a+b,0) : null;
}
// 평가자 한 명의 전체 합산점수 (essay 포함)
function getEvTotalScore(scores,targetEmpNo,stage,evNo,competencies) {
  let total=0; let ok=true;
  for(const comp of competencies){
    if(comp.type==="essay"){
      if(stage==="본인진단"){continue;} // 본인진단 주관식은 점수 없음
      const s=scores[SK(targetEmpNo,stage,evNo,comp.title,"essay")];
      if(s==null){ok=false;break;} total+=s;
    } else {
      const s=getEvCompSum(scores,targetEmpNo,stage,evNo,comp.title,comp.questions);
      if(s===null){ok=false;break;} total+=s;
    }
  }
  return ok?total:null;
}
// 문항별 단계 평균 (QuestionRef용 - 유지)
function getQStageAvg(scores,progressRows,targetEmpNo,stage,compTitle,qi) {
  const isSD = stage==="본인진단";
  const sdRow = getRow(progressRows,targetEmpNo,"본인진단");
  const submitted = isSD
    ? (sdRow?.status==="완료"?[targetEmpNo]:[])
    : (getRow(progressRows,targetEmpNo,stage)?.completedBy||[]);
  if (!submitted.length) return null;
  const vals = submitted.map(ev=>scores[SK(targetEmpNo,stage,ev,compTitle,qi)]).filter(v=>v!=null);
  return vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
}


// ── 가중치 종합점수 ────────────────────────────────────────────────────────────
function getWeightedTotal(scores,progressRows,targetEmpNo,competencies,weights) {
  const maxTotal = competencies.filter(c=>c.type!=="essay").reduce((a,c)=>a+(c.questions?.length||0)*4,0)
    + competencies.filter(c=>c.type==="essay").reduce((a,c)=>a+(c.maxScore||30),0);
  if(!maxTotal) return null;
  const allSt = ["본인진단",...STAGES];
  let wsum=0, wtotal=0;
  for(const st of allSt){
    const w=weights[st]||0; if(!w) continue;
    const sdRow=getRow(progressRows,targetEmpNo,"본인진단");
    const evs=st==="본인진단"
      ?(sdRow?.status==="완료"?[targetEmpNo]:[])
      :(getRow(progressRows,targetEmpNo,st)?.completedBy||[]);
    if(!evs.length) continue;
    const totals=evs.map(ev=>{
      let t=0,ok=true;
      for(const comp of competencies){
        if(comp.type==="essay"){const s=scores[SK(targetEmpNo,st,ev,comp.title,"essay")];if(s==null){ok=false;break;}t+=s;}
        else{const vs=(comp.questions||[]).map((_,qi)=>scores[SK(targetEmpNo,st,ev,comp.title,qi)]).filter(v=>v!=null);if(vs.length!==(comp.questions||[]).length){ok=false;break;}t+=vs.reduce((a,b)=>a+b,0);}
      }
      return ok?t:null;
    }).filter(v=>v!==null);
    if(!totals.length) continue;
    const groupAvg=totals.reduce((a,b)=>a+b,0)/totals.length;
    wsum+=groupAvg*(w/100); wtotal+=w;
  }
  if(!wtotal) return null;
  return +wsum.toFixed(1);
}


// ── 업적평가 상수 ──────────────────────────────────────────────────────────────
const ACH_EVAL_STAGES = ["1차평가","2차평가","3차평가"];
const KPI_CONFIRM_STAGES = ["1차컨펌","2차컨펌","최종컨펌"];
const ACH_WEIGHTS_DEFAULT = {"자기진단":20,"1차평가":30,"2차평가":30,"3차평가":20};
const SKA = (t,st,ev,kid) => `${t}|업적|${st}|${ev}|${kid}`;
const KPI_CONFIRM_STAGE_RANK = {"1차컨펌":1,"2차컨펌":2,"최종컨펌":3};

function initKpiApproval() {
  const r={};
  TARGETS.forEach(t=>{r[t.empNo]={status:"대기중",currentStageIdx:0,history:[]};});
  return r;
}
function initKpiChain() {
  return TARGETS.reduce((acc,t)=>{
    const lead=teamLeadByDept[t.dept];
    const first=(lead&&lead!==t.empNo)?lead:(t.empNo!=="a078"?"a078":"a015");
    acc[t.empNo]={"1차컨펌":[first].filter(e=>e!==t.empNo),"2차컨펌":["e003"],"최종컨펌":["e002"]};
    return acc;
  },{});
}
function initAchAssignments() {
  return TARGETS.map(t=>{
    const lead=teamLeadByDept[t.dept];
    const first=(lead&&lead!==t.empNo)?lead:(t.empNo!=="a078"?"a078":"a015");
    return {targetEmpNo:t.empNo,"1차평가":[first].filter(e=>e!==t.empNo),"2차평가":["e003"].filter(e=>e!==t.empNo),"3차평가":["e002"].filter(e=>e!==t.empNo)};
  });
}
function initAchievementProgress() {
  const rows=[];
  TARGETS.forEach(t=>{
    rows.push({id:`${t.empNo}-업적-자기진단`,targetEmpNo:t.empNo,stage:"자기진단",status:"권한대기",progress:0,completedBy:[],comments:{}});
    ACH_EVAL_STAGES.forEach(s=>{rows.push({id:`${t.empNo}-업적-${s}`,targetEmpNo:t.empNo,stage:s,status:"권한대기",progress:0,completedBy:[],comments:{},avg:"-"});});
  });
  return rows;
}
function getAchRow(achProg,empNo,stage){return achProg.find(r=>r.targetEmpNo===empNo&&r.stage===stage);}
function isKpiConfirmed(kpiApproval,empNo){return kpiApproval[empNo]?.status==="확정";}
function getAchEvaluators(assignments,empNo,stage){return getEvaluators(assignments,empNo,stage);}
function isAchSelfDiagDone(achProg,empNo){return getAchRow(achProg,empNo,"자기진단")?.status==="완료";}
function isAchUnlocked(achProg,kpiApproval,empNo,stage,achAsgn){
  if(!isKpiConfirmed(kpiApproval,empNo)) return false;
  if(!isAchSelfDiagDone(achProg,empNo)) return false;
  const idx=ACH_EVAL_STAGES.indexOf(stage);
  for(let i=0;i<idx;i++){
    const s=ACH_EVAL_STAGES[i];
    const evs=getAchEvaluators(achAsgn,empNo,s);
    if(evs.length>0&&getAchRow(achProg,empNo,s)?.status!=="완료") return false;
  }
  return true;
}
function getValidKpiStages(chain, empNo) {
  var ch = chain[empNo] || {};
  return KPI_CONFIRM_STAGES.filter(function(s){ return (ch[s]||[]).filter(function(e){return e&&e!=="__NONE__";}).length>0; });
}
function getNextValidIdx(chain, empNo, curIdx) {
  var ch = chain[empNo] || {};
  for(var i=curIdx+1;i<KPI_CONFIRM_STAGES.length;i++){
    if((ch[KPI_CONFIRM_STAGES[i]]||[]).filter(function(e){return e&&e!=="__NONE__";}).length>0) return i;
  }
  return KPI_CONFIRM_STAGES.length;
}
function getKpiConfirmStageForUser(kpiApproval,kpiChain,empNo,evaluatorEmpNo){
  // 이 evaluator가 empNo의 KPI에서 현재 컨펌해야 하는 단계를 반환
  const appr=kpiApproval[empNo];
  if(!appr||!["제출됨","컨펌중"].includes(appr.status)) return null;
  const chain=kpiChain[empNo]||{};
  const stage=KPI_CONFIRM_STAGES[appr.currentStageIdx];
  if(!stage) return null;
  if((chain[stage]||[]).includes(evaluatorEmpNo)) return stage;
  return null;
}
function getAchWeightedTotal(achScores,achProg,kpiItems,empNo,achWeights){
  const items=kpiItems[empNo]||[];
  if(!items.length) return null;
  const wt=achWeights[empNo]!==undefined?achWeights[empNo]:{...ACH_WEIGHTS_DEFAULT};
  let wsum=0,hasAny=false;
  for(const st of["자기진단",...ACH_EVAL_STAGES]){
    const w=wt[st]||0; if(!w) continue;
    const sdRow=getAchRow(achProg,empNo,"자기진단");
    const evs=st==="자기진단"?(sdRow?.status==="완료"?[empNo]:[]):(getAchRow(achProg,empNo,st)?.completedBy||[]);
    if(!evs.length) continue;
    const totals=evs.map(ev=>{
      let t=0,ok=true;
      for(const item of items){const s=achScores[SKA(empNo,st,ev,item.id)];if(s==null){ok=false;break;}t+=s;}
      return ok?t:null;
    }).filter(v=>v!==null);
    if(!totals.length) continue;
    const ga=totals.reduce((a,b)=>a+b,0)/totals.length;
    wsum+=ga*(w/100); hasAny=true;
  }
  return hasAny?+wsum.toFixed(1):null;
}

            <input type="checkbox" checked={value.length===0} onChange={()=>toggle(NONE)}/> 없음
          </label>
          <hr className="my-1 border-slate-700/50"/>
          {people.filter(p=>p.empNo!==excludeEmpNo).map(p=>(
            <label key={p.empNo} className="flex cursor-pointer items-center gap-2 rounded-xl px-2 py-1.5 text-xs hover:bg-slate-700">
              <input type="checkbox" checked={value.includes(p.empNo)} onChange={()=>toggle(p.empNo)}/>
              <span>{p.empNo} · {p.name} · {p.dept}</span>
            </label>
          ))}
          <div className="mt-1 flex justify-end"><Btn sm onClick={()=>setOpen(false)}>닫기</Btn></div>
        </div>
      )}
    </div>
  );
}

// ── 역량항목 편집 모달 (객관식/주관식) ──────────────────────────────────────────
function CompetencyModal({competency,onClose,onSave}) {
  const initType = competency.type||"objective";
  const [type,setType] = useState(initType);
  const [category,setCategory] = useState(competency.category||"");
  const [title,setTitle] = useState(competency.title||"");
  const [desc,setDesc] = useState(competency.desc||"");
  // 객관식
  const [questions,setQuestions] = useState(competency.questions?.length?[...competency.questions]:[""])
  // 주관식
  const [essayQ,setEssayQ] = useState(competency.question||"");
  const [maxScore,setMaxScore] = useState(competency.maxScore||30);
  const [criteria,setCriteria] = useState(competency.scoringCriteria||[
    {range:"26-30",label:"매우 우수",desc:""},
    {range:"16-25",label:"우수",desc:""},
    {range:"6-15",label:"보통",desc:""},
    {range:"0-5",label:"미흡",desc:""},
  ]);
  const [err,setErr] = useState("");
  const save = () => {
    if (type==="essay"){
      if (!essayQ.trim()){setErr("서술형 질문을 입력하세요.");return;}
      onSave({category:"서술형",title:essayQ.slice(0,20),desc:"",type:"essay",question:essayQ,maxScore:Number(maxScore),scoringCriteria:[]});
    } else {
      if (!title.trim()){setErr("역량명을 입력하세요.");return;}
      if (!category.trim()){setErr("역량구분을 입력하세요.");return;}
      onSave({category,title,desc,type:"objective",questions:questions.filter(q=>q.trim())});
    }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="w-full max-w-2xl overflow-auto rounded-3xl bg-slate-800 p-6 shadow-2xl max-h-[90vh]">
        <div className="mb-5 flex items-start justify-between">
          <div><span className="rounded-full bg-slate-700/50 px-3 py-1 text-xs font-medium text-slate-600">평가항목 설정</span>
            <h2 className="mt-2 text-xl font-bold">평가항목 {competency._isNew?"추가":"수정"}</h2></div>
          <button onClick={onClose} className="rounded-xl border border-slate-600 px-3 py-1.5 text-sm text-slate-500 hover:bg-slate-700">닫기</button>
        </div>
        {/* 객관식/주관식 탭 - 신규 추가 시에만 선택 가능 */}
        {competency._isNew&&(
          <div className="mb-5 flex rounded-2xl bg-slate-800 p-1">
            {[["objective","📊 객관식 (0~4점)"],["essay","✏ 서술형 (0~30점)"]].map(([k,l])=>(
              <button key={k} onClick={()=>setType(k)}
                className={`flex-1 rounded-xl py-2.5 text-sm font-semibold transition ${type===k?"bg-indigo-600 shadow-lg text-white":"text-slate-500"}`}>{l}</button>
            ))}
          </div>
        )}
        {!competency._isNew&&(
          <div className="mb-4 inline-flex items-center gap-2 rounded-full border px-3 py-1 text-xs font-medium text-slate-400 border-slate-600">
            {type==="essay"?"✏ 서술형 항목":"📊 객관식 항목"}
          </div>
        )}
        {/* 객관식만 역량구분/역량명/역량정의 표시 */}
        {type==="objective"&&(
          <>
            <div className="grid gap-4 md:grid-cols-2">
              <div><label className="mb-1 block text-xs font-semibold text-slate-600">역량구분</label>
                <input value={category} onChange={e=>setCategory(e.target.value)} placeholder="예: 공통역량" className="h-10 w-full rounded-xl border border-slate-600 bg-white px-3 text-sm text-slate-900 focus:outline-none focus:border-indigo-500"/></div>
              <div><label className="mb-1 block text-xs font-semibold text-slate-600">역량명</label>
                <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 책임감" className="h-10 w-full rounded-xl border border-slate-600 bg-white px-3 text-sm text-slate-900 focus:outline-none focus:border-indigo-500"/></div>
            </div>
            <div className="mt-4"><label className="mb-1 block text-xs font-semibold text-slate-600">역량 정의 (선택)</label>
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} className="w-full rounded-xl border border-slate-600 px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 resize-none"/></div>
          </>
        )}

        {type==="objective"?(
          <div className="mt-4">
            <div className="mb-2 flex items-center justify-between">
              <label className="text-xs font-semibold text-slate-600">평가문항 (0~4점)</label>
              <Btn sm onClick={()=>setQuestions(p=>[...p,""])}>+ 문항 추가</Btn>
            </div>
            <div className="space-y-2">
              {questions.map((q,i)=>(
                <div key={i} className="flex items-center gap-2 rounded-xl border border-slate-700/50 bg-slate-900/40 px-3 py-2">
                  <span className="text-xs font-bold text-slate-400 w-4">{i+1}</span>
                  <input value={q} onChange={e=>setQuestions(p=>p.map((x,j)=>j===i?e.target.value:x))} className="flex-1 bg-transparent text-sm focus:outline-none" placeholder="평가문항 입력"/>
                  <button onClick={()=>setQuestions(p=>p.filter((_,j)=>j!==i))} className="text-xs text-slate-400 hover:text-red-500">삭제</button>
                </div>
              ))}
            </div>
          </div>
        ):(
          <div className="mt-4 space-y-4">
            <div>
              <label className="mb-1 block text-xs font-semibold text-slate-600">서술형 질문</label>
              <textarea value={essayQ} onChange={e=>setEssayQ(e.target.value)} rows={4}
                placeholder="예: 지난 1년간 업무 개선을 위해 실행한 내용을 구체적으로 서술하시오."
                className="w-full rounded-xl border border-slate-600 px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 resize-none"/>
            </div>
            <div className="flex items-center gap-3">
              <label className="text-xs font-semibold text-slate-400 whitespace-nowrap">점수 부여치 (최대 배점)</label>
              <div className="flex items-center gap-2">
                <input type="number" min={0} max={30} value={maxScore} onChange={e=>setMaxScore(Math.min(30,Math.max(0,Number(e.target.value))))}
                  className="h-9 w-24 rounded-xl border border-slate-600 px-3 text-sm text-center focus:outline-none focus:border-indigo-500"/>
                <span className="text-xs text-slate-500">점 (0 ~ 30점)</span>
              </div>
            </div>
          </div>
        )}
        {err&&<div className="mt-3 rounded-xl border border-red-700/50 bg-red-50 px-4 py-2 text-sm text-red-700">{err}</div>}
        <div className="mt-6 flex justify-end gap-2"><Btn onClick={onClose}>취소</Btn><Btn onClick={save} primary>저장</Btn></div>
      </div>
    </div>
  );
}

// ── 공통 평가 폼 컨텐츠 ───────────────────────────────────────────────────────
function EvalForm({targetEmpNo,stage,evaluatorEmpNo,competencies,scores,setScores,
  essayAnswers,setEssayAnswers,comment,setComment,
  progressRows,assignments,userRank,onSaveDraft,onSubmit,isSelfDiag=false,readOnly=false}) {

  const objComps = competencies.filter(c=>c.type!=="essay");
  const essayComps = competencies.filter(c=>c.type==="essay");

  // totalQ: 객관식 문항 수 + 주관식 개수(본인진단: 서술 필요, 타인평가: 점수 필요)
  const totalQ = objComps.reduce((s,c)=>s+(c.questions?.length||0),0)
    + (isSelfDiag ? essayComps.length : essayComps.length);

  const objKeys = objComps.flatMap(comp=>(comp.questions||[]).map((_,qi)=>SK(targetEmpNo,stage,evaluatorEmpNo,comp.title,qi)));
  const objAnswered = objKeys.filter(k=>scores[k]!=null).length;
  const essayAnsweredCount = essayComps.filter(comp=>
    scores[SK(targetEmpNo,stage,evaluatorEmpNo,comp.title,"essay")]!=null
  ).length;
  const answered = objAnswered + essayAnsweredCount;

  const target = getPerson(targetEmpNo);
  const stageRow = getRow(progressRows,targetEmpNo,stage);
  const completedCount = (stageRow?.completedBy||[]).length;
  const requiredCount = isSelfDiag ? 1 : getEvaluators(assignments,targetEmpNo,stage).length;

  return (
    <div className="max-w-3xl mx-auto space-y-4">
      {/* 헤더 카드 */}
      <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl">
        <div className="flex items-start justify-between flex-wrap gap-4">
          <div>
            <div className="flex items-center gap-2 mb-1">
              <h2 className="text-xl font-bold">{isSelfDiag?"본인진단":target.name+" "+stage}</h2>
              {!isSelfDiag&&<StatusBadge status={getEffectiveStatus(assignments,progressRows,stageRow||{targetEmpNo,stage,status:"대기중",completedBy:[]})}/>}
            </div>
            {isSelfDiag
              ? <p className="text-xs text-slate-500">자신의 역량을 솔직하게 평가하세요.</p>
              : <><p className="text-xs text-slate-500">{target.empNo} · {target.dept} · {target.title}</p>
                  <p className="mt-1 text-xs text-slate-400">필요 평가자: {completedCount}/{requiredCount}명 제출 완료</p></>}
          </div>
          <div className="rounded-xl bg-slate-900/40 px-4 py-2.5 text-center text-sm text-slate-600">
            응답률 <strong className="text-slate-100">{totalQ>0?Math.round((answered/totalQ)*100):0}%</strong>
          </div>
        </div>
      </div>

      {isSelfDiag&&(
        <div className="rounded-xl border border-amber-100 bg-amber-50 px-4 py-3 text-xs text-amber-800 flex gap-2">
          <span className="shrink-0">📋</span> 본인진단 제출 완료 시 동료평가 권한이 자동으로 열립니다.
        </div>
      )}

      {/* 타인평가: 점수 참고 + 의견 */}
      {!isSelfDiag && userRank>0 && (
        <ScoreSummaryTable targetEmpNo={targetEmpNo} competencies={competencies} scores={scores} progressRows={progressRows} userRank={userRank} assignments={assignments}/>
      )}

      {/* 객관식 역량 문항 */}
      {objComps.map(comp=>(
        <div key={comp.title} className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl">
          <span className="rounded-full bg-slate-700/50 px-2.5 py-0.5 text-xs font-medium text-slate-600">{comp.category}</span>
          <h3 className="mt-2 text-base font-bold">{comp.title}</h3>
          <p className="mt-1 text-xs text-slate-500">{comp.desc}</p>
          <div className="mt-4 space-y-3">
            {(comp.questions||[]).map((q,qi)=>{
              const key = SK(targetEmpNo,stage,evaluatorEmpNo,comp.title,qi);
              const sc = scores[key];
              return (
                <div key={key} className="rounded-xl border border-slate-700/50 p-4">
                  <div className="mb-2 flex items-start gap-2">
                    <div className={`mt-0.5 h-5 w-5 shrink-0 rounded-full border flex items-center justify-center text-xs ${sc?"border-green-500 bg-green-500 text-white":"border-slate-300"}`}>{sc?"✓":""}</div>
                    <p className="text-sm font-medium">문항 {qi+1}. {q}</p>
                  </div>
                  {!isSelfDiag&&<QuestionRef targetEmpNo={targetEmpNo} compTitle={comp.title} qi={qi} userRank={userRank} scores={scores} progressRows={progressRows}/>}
                  <div className="grid grid-cols-5 gap-2">
                    {[0,1,2,3,4].map(s=>(
                      <button key={s}
                        onClick={readOnly?undefined:()=>setScores(p=>({...p,[key]:s}))}
                        className={`rounded-xl border py-3 text-center transition
                          ${sc===s?"border-slate-900 bg-slate-900 text-white":"border-slate-700/50 bg-slate-900/40 text-slate-300"}
                          ${readOnly?"cursor-default":"hover:border-slate-300"}`}>
                        <div className="text-base font-bold">{s}</div>
                        <div className="mt-0.5 text-[10px]">{SCORE_LABELS[s]}</div>
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* 서술형 문항 */}
      {essayComps.map(comp=>{
        const answerKey = `${targetEmpNo}|${comp.title}`;
        const selfAnswer = (essayAnswers||{})[answerKey]||"";
        const scoreKey = SK(targetEmpNo,stage,evaluatorEmpNo,comp.title,"essay");
        const essayScore = scores[scoreKey];
        const maxSc = comp.maxScore||30;
        return (

// 본인진단 완료 후 합산점수 표시 컴포넌트
function SelfCompletionScore({selfRow,empNo,competencies,scores}) {
  const objComps = competencies.filter(c=>c.type!=="essay");
  const essayComps = competencies.filter(c=>c.type==="essay");
  const rows = objComps.map(comp=>{
    const vals = (comp.questions||[]).map((_,qi)=>scores[SK(empNo,"본인진단",empNo,comp.title,qi)]).filter(v=>v!=null);
    const sum = vals.length===(comp.questions||[]).length ? vals.reduce((a,b)=>a+b,0) : null;
    const max = (comp.questions||[]).length*4;
    return {title:comp.title,sum,max,isEssay:false};
  });
  const essayRows = essayComps.map(comp=>{
    const sc = scores[SK(empNo,"본인진단",empNo,comp.title,"essay")];
    return {title:comp.question||comp.title,sum:sc!=null?sc:null,max:comp.maxScore||30,isEssay:true};
  });
  const allRows = [...rows,...essayRows];
  const grandTotal = allRows.every(r=>r.sum!==null) ? allRows.reduce((a,r)=>a+r.sum,0) : null;
  const grandMax = allRows.reduce((a,r)=>a+r.max,0);
  return (
    <div className="mt-4 rounded-xl bg-slate-900/40 border border-slate-700/50 p-4 text-sm text-left w-full">
      <div className="text-xs font-semibold text-slate-500 mb-3">역량별 합산점수</div>
      <div className="space-y-2">
        {allRows.map(r=>(
          <div key={r.title} className="flex items-center justify-between gap-2">
            <span className={`text-xs ${r.isEssay?"text-violet-600":"text-slate-600"}`}>
              {r.isEssay?"✏ ":""}
              {r.title.length>30?r.title.slice(0,30)+"…":r.title}
            </span>
            <span className="font-semibold text-slate-100 text-sm shrink-0">
              {r.sum!==null?r.sum:<span className="text-slate-300">-</span>}
              <span className="text-slate-400 font-normal text-[10px]">/{r.max}</span>
            </span>
          </div>
        ))}
        <div className="border-t border-slate-600 pt-2 flex items-center justify-between">
          <span className="text-slate-300 font-semibold text-xs">총점</span>
          <span className="font-bold text-slate-100">{grandTotal!==null?grandTotal:<span className="text-slate-300">-</span>}<span className="text-slate-400 font-normal text-[10px]">/{grandMax}</span></span>
        </div>
      </div>
    </div>
  );
}

function ScoreSummaryTable({targetEmpNo,competencies,scores,progressRows,userRank,assignments}) {
  const visStages = ["본인진단",...STAGES.filter(s=>STAGE_RANK[s]<=userRank)];
  const getCount = s => {
    if (s==="본인진단") return {done:getRow(progressRows,targetEmpNo,"본인진단")?.status==="완료"?1:0,total:1};
    const r = getRow(progressRows,targetEmpNo,s);
    return {done:r?.completedBy?.length||0, total:getEvaluators(assignments,targetEmpNo,s).length};
  };
  // 의견 수집
  const commentGroups = visStages.map(s=>{
    const items = [];
    if(s==="본인진단"){
      const row=getRow(progressRows,targetEmpNo,"본인진단");
      if(row?.comment) items.push({evNo:targetEmpNo,comment:row.comment});
    } else {
      const row=getRow(progressRows,targetEmpNo,s);
      (row?.completedBy||[]).forEach(evNo=>{
        const c=(row.comments||{})[evNo]||"";
        if(c) items.push({evNo,comment:c});
      });
    }
    return {stage:s,items};
  }).filter(g=>g.items.length>0);

  return (
    <div className="space-y-3">
      {/* 점수 테이블 */}
      <div className="rounded-2xl border border-slate-600 bg-slate-800 overflow-hidden shadow-sm">
        <div className="px-4 py-3 bg-slate-700/50 border-b border-slate-600/70 flex items-center gap-2">
          <span className="text-sm font-semibold text-slate-200">📊 역량별 합산점수</span>
          <span className="text-xs text-slate-400">(그룹 평균 · 제출 완료 기준)</span>
        </div>
        <div className="overflow-auto p-3">
          <table className="w-full text-xs">
            <thead>
              <tr>
                <th className="text-left pb-2 pr-4 font-semibold text-slate-600">역량</th>
                {visStages.map(s=>{
                  const {done,total}=getCount(s);
                  const label=s==="본인진단"?"본인":s;
                  const color=STAGE_COLORS[s]||"from-slate-400 to-slate-500";
                  return (
                    <th key={s} className="text-center pb-2 px-3">
                      <div className={`inline-flex items-center gap-1 rounded-full bg-gradient-to-r ${color} text-white px-2.5 py-0.5 text-[10px] font-semibold`}>{label}</div>
                      <div className="text-[10px] font-normal text-slate-400 mt-1">{done}/{total}명</div>
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {competencies.filter(c=>c.type!=="essay").map((comp,ci)=>(
                <tr key={comp.title} className={ci%2===0?"bg-slate-50/50":""}>
                  <td className="py-2 pr-4 font-medium text-slate-300">{comp.title}</td>
                  {visStages.map(s=>{
                    const score=getCompStageScore(scores,progressRows,targetEmpNo,s,comp.title,comp.questions);
                    const maxPossible=(comp.questions?.length||0)*4;
                    return <td key={s} className="py-2 px-3 text-center">
                      {score!==null
                        ? <span className="font-bold text-slate-100">{score}<span className="text-slate-400 font-normal text-[10px]">/{maxPossible}</span></span>
                        : <span className="text-slate-300">-</span>}
                    </td>;
                  })}
                </tr>
              ))}
              {competencies.filter(c=>c.type==="essay").map(comp=>(
                <tr key={comp.title} className="border-t border-dashed border-slate-600">
                  <td className="py-2 pr-4 font-medium text-violet-700">✏ {comp.question?.slice(0,20)||comp.title}<span className="ml-1 text-[10px] text-violet-400">(서술형)</span></td>
                  {visStages.map(s=>{
                    const sc=getCompStageScore(scores,progressRows,targetEmpNo,s,comp.title,[],true);
                    return <td key={s} className="py-2 px-3 text-center">
                      {sc!==null
                        ? <span className="font-bold text-violet-700">{sc}<span className="text-slate-400 font-normal text-[10px]">/{comp.maxScore||30}</span></span>
                        : <span className="text-slate-300">-</span>}
                    </td>;
                  })}
                </tr>
              ))}
              {/* 총점 행 */}
              <tr className="border-t-2 border-slate-300 bg-slate-900/40 font-semibold">
                <td className="py-2 pr-4 text-slate-200">총점</td>
                {visStages.map(s=>{
                  const objTotal = competencies.filter(c=>c.type!=="essay").reduce((acc,comp)=>{
                    if(acc===null) return null;
                    const sc=getCompStageScore(scores,progressRows,targetEmpNo,s,comp.title,comp.questions);
                    return sc!==null?acc+sc:null;
                  },0);
                  const essayTotal = competencies.filter(c=>c.type==="essay").reduce((acc,comp)=>{
                    if(acc===null) return null;
                    const sc=getCompStageScore(scores,progressRows,targetEmpNo,s,comp.title,[],true);
                    return sc!==null?acc+sc:null;
                  },0);
                  const grand = (objTotal!==null&&essayTotal!==null)?objTotal+essayTotal:null;
                  const maxObj = competencies.filter(c=>c.type!=="essay").reduce((a,c)=>a+(c.questions?.length||0)*4,0);
                  const maxEssay = competencies.filter(c=>c.type==="essay").reduce((a,c)=>a+(c.maxScore||30),0);
                  return <td key={s} className="py-2 px-3 text-center">
                    {grand!==null
                      ? <span className="text-slate-100">{grand}<span className="text-slate-400 font-normal text-[10px]">/{maxObj+maxEssay}</span></span>
                      : <span className="text-slate-300">-</span>}

            </tbody>
          </table>
        </div>
      </div>

      {/* 종합의견 카드 */}
      {commentGroups.length>0&&(
        <div className="rounded-2xl border border-slate-600 bg-slate-800 overflow-hidden shadow-sm">
          <div className="px-4 py-3 bg-slate-700/50 border-b border-slate-600/70">
            <span className="text-sm font-semibold text-slate-200">💬 종합 의견</span>
          </div>
          <div className="p-4 space-y-4">
            {commentGroups.map(({stage,items})=>(
              <div key={stage}>
                <div className="flex items-center gap-2 mb-2">
                  <span className={`text-[11px] font-semibold px-2.5 py-1 rounded-full border ${STAGE_BADGE[stage]||"bg-slate-50 text-slate-400 border-slate-700/50"}`}>
                    {stage==="본인진단"?"본인진단":stage}
                  </span>
                  <div className="flex-1 h-px bg-slate-700/50"/>
                </div>
                <div className="space-y-2 pl-2">
                  {items.map(({evNo,comment},i)=>(
                    <div key={i} className="relative pl-4">
                      <div className="absolute left-0 top-2 w-2 h-2 rounded-full bg-slate-300"/>
                      <div className="bg-slate-50 rounded-xl p-3">
                        <div className="flex items-center gap-1.5 mb-1.5">
                          <div className="w-5 h-5 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">{getPerson(evNo).name[0]}</div>
                          <span className="text-xs font-semibold text-slate-300">{getPerson(evNo).name}</span>
                          <span className="text-[10px] text-slate-400">{getPerson(evNo).title}</span>
                        </div>
                        <p className="text-xs text-slate-400 leading-relaxed">{comment}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// 문항별 참고 점수 뱃지
function QuestionRef({targetEmpNo,compTitle,qi,userRank,scores,progressRows}) {
  const visStages = ["본인진단",...STAGES.filter(s=>STAGE_RANK[s]<=userRank)];
  const items = visStages.map(s=>{
    const avg = getQStageAvg(scores,progressRows,targetEmpNo,s,compTitle,qi);
    if (!avg) return null;
    const submitted = s==="본인진단"
      ? (getRow(progressRows,targetEmpNo,"본인진단")?.status==="완료"?1:0)
      : (getRow(progressRows,targetEmpNo,s)?.completedBy?.length||0);
    return {s,avg,submitted};
  }).filter(Boolean);
  if (!items.length) return null;
  return (
    <div className="flex flex-wrap gap-1.5 mb-3 items-center">
      <span className="text-[10px] text-slate-400">참고:</span>
      {items.map(({s,avg,submitted})=>(
        <span key={s} className={`rounded-full px-2 py-0.5 text-[10px] font-medium ${s==="본인진단"?"bg-slate-100 text-slate-600":"bg-blue-50 border border-blue-100 text-blue-700"}`}>
          {s==="본인진단"?"본인":s} {avg}점{s!=="본인진단"?` (${submitted}명)`:""}
        </span>
      ))}
    </div>
  );
}

// ── 본인진단 뷰 (req 2) ────────────────────────────────────────────────────────
function SelfDiagView({currentUser,progressRows,setProgressRows,leaderCompetencies,memberCompetencies,scores,setScores,essayAnswers,setEssayAnswers,showToast}) {
  const competencies = getComps(currentUser.title, leaderCompetencies, memberCompetencies);
  const selfRow = getRow(progressRows,currentUser.empNo,"본인진단");
  const [comment,setComment] = useState(selfRow?.comment||"");
  const objCompsSD = competencies.filter(c=>c.type!=="essay");
  const essayCompsSD = competencies.filter(c=>c.type==="essay");
  const allObjKeys = objCompsSD.flatMap(comp=>(comp.questions||[]).map((_,qi)=>SK(currentUser.empNo,"본인진단",currentUser.empNo,comp.title,qi)));
  const objAnsweredSD = allObjKeys.filter(k=>scores[k]!=null).length;
  const essayAnsweredSD = essayCompsSD.filter(comp=>(essayAnswers||{})[`${currentUser.empNo}|${comp.title}`]?.trim()).length;
  const answered = objAnsweredSD + essayAnsweredSD;
  const totalQ = objCompsSD.reduce((s,c)=>s+(c.questions?.length||0),0) + essayCompsSD.length;
  const avgScore = allObjKeys.filter(k=>scores[k]!=null).length
    ? +(allObjKeys.filter(k=>scores[k]!=null).map(k=>scores[k]).reduce((a,b)=>a+b,0)/allObjKeys.filter(k=>scores[k]!=null).length).toFixed(1) : 0;

  if (selfRow?.status==="완료") return (
    <div className="flex flex-1 items-center justify-center p-12">
      <div className="text-center max-w-md">
        <div className="text-5xl mb-4">✅</div>
        <h2 className="text-xl font-bold">본인진단 완료</h2>
        <p className="mt-2 text-sm text-slate-500">타인평가 탭을 확인하세요.</p>
        <SelfCompletionScore selfRow={selfRow} empNo={currentUser.empNo} competencies={competencies} scores={scores}/>
      </div>
    </div>
  );

  const saveDraft = () => {
    setProgressRows(prev=>prev.map(r=>r.id===`${currentUser.empNo}-본인진단`
      ?{...r,status:"작성중",progress:Math.round((answered/totalQ)*100),avg:avgScore||"-",comment}:r));
    showToast("임시저장되었습니다.");
  };
  const submit = () => {
    if (answered<totalQ){showToast("모든 문항을 평가해야 합니다.");return;}
    setProgressRows(prev=>prev.map(r=>r.id===`${currentUser.empNo}-본인진단`
      ?{...r,status:"완료",progress:100,avg:avgScore,comment:"",completedBy:[currentUser.empNo],comments:{}}:r));
    showToast("본인진단 완료! 동료평가 권한이 자동으로 열립니다.");
  };

  return (
    <div className="flex-1 overflow-y-auto bg-slate-800/60 p-6">
      <EvalForm targetEmpNo={currentUser.empNo} stage="본인진단" evaluatorEmpNo={currentUser.empNo}
        competencies={competencies} scores={scores} setScores={setScores}
        essayAnswers={essayAnswers} setEssayAnswers={setEssayAnswers}
        comment={comment} setComment={setComment}
        progressRows={progressRows} assignments={[]} userRank={-1}
        onSaveDraft={saveDraft} onSubmit={submit} isSelfDiag={true}/>
    </div>
  );
}

// ── 타인평가 뷰 (req 5 포함) ──────────────────────────────────────────────────
function PeerEvalView({currentUser,assignments,progressRows,setProgressRows,leaderCompetencies,memberCompetencies,scores,setScores,essayAnswers,setEssayAnswers,showToast}) {
  const [selectedId,setSelectedId] = useState("");
