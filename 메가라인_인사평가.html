// ── 최종 인사평가: 피평가자 가중치 설정 ────────────────────────────────────
function FinalWeightSetup(props) {
  var activeTargets=props.activeTargets, finalWeights=props.finalWeights, setFinalWeights=props.setFinalWeights, showToast=props.showToast;
  function getW(empNo){ return finalWeights[empNo]||{ach:50,comp:50}; }
  function setW(empNo,key,val){
    var v=Math.min(100,Math.max(0,Number(val)));
    var prev=getW(empNo);
    var next=key==="ach"?{ach:v,comp:100-v}:{ach:100-v,comp:v};
    setFinalWeights(function(p){var r=Object.assign({},p);r[empNo]=next;return r;});
  }
  function save(){
    try{localStorage.setItem("hr_final_weights",JSON.stringify(finalWeights));}catch(e){}
    showToast("가중치가 저장되었습니다.");
  }
  return (
    <div className="flex-1 overflow-y-auto bg-slate-900 p-6">
      <div className="max-w-4xl mx-auto space-y-4">
        <div className="flex items-center justify-between">
          <div>
            <h2 className="text-xl font-bold text-slate-100">피평가자 가중치 설정</h2>
            <p className="text-xs text-slate-400 mt-1">업적평가·역량평가 비중을 개인별로 설정합니다. 합계 100%여야 합니다.</p>
          </div>
          <Btn primary onClick={save}>저장</Btn>
        </div>
        <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-4">
          <p className="text-xs font-semibold text-slate-400 mb-2">일괄 설정</p>
          <div className="flex flex-wrap gap-2">
            {[[50,50],[60,40],[70,30],[40,60],[30,70]].map(function(pair){
              return (
                <button key={pair[0]} onClick={function(){
                  var nw={};
                  activeTargets.forEach(function(t){nw[t.empNo]={ach:pair[0],comp:pair[1]};});
                  setFinalWeights(nw);
                }} className="rounded-xl border border-slate-600 bg-slate-700 px-3 py-1.5 text-xs font-semibold text-slate-300 hover:bg-indigo-600 hover:text-white transition">
                  {"업적 "+pair[0]+"% / 역량 "+pair[1]+"%"}
                </button>
              );
            })}
          </div>
        </div>
        <div className="rounded-2xl border border-slate-700/50 bg-slate-800 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-slate-900/60">
              <tr>
                {["이름","부서·직위","업적평가(%)","역량평가(%)","합계"].map(function(h){return <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-slate-400">{h}</th>;})}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-700/30">
              {activeTargets.map(function(t){
                var w=getW(t.empNo);
                var sum=(w.ach||0)+(w.comp||0);
                return (
                  <tr key={t.empNo} className="hover:bg-slate-700/30">
                    <td className="px-4 py-3 font-semibold text-slate-200">{t.name}</td>
                    <td className="px-4 py-3 text-xs text-slate-400">{t.dept+" · "+t.title}</td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1">
                        <input type="number" min={0} max={100} value={w.ach!=null?w.ach:50}
                          onChange={function(e){setW(t.empNo,"ach",e.target.value);}}
                          className="h-8 w-16 rounded-lg border border-slate-600 bg-white text-slate-900 text-center text-xs font-bold focus:outline-none"/>
                        <span className="text-xs text-slate-400">%</span>
                      </div>
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1">
                        <input type="number" min={0} max={100} value={w.comp!=null?w.comp:50}
                          onChange={function(e){setW(t.empNo,"comp",e.target.value);}}
                          className="h-8 w-16 rounded-lg border border-slate-600 bg-white text-slate-900 text-center text-xs font-bold focus:outline-none"/>
                        <span className="text-xs text-slate-400">%</span>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-center">
                      <span className={sum===100?"font-bold text-sm text-green-400":"font-bold text-sm text-red-400"}>{sum+"%"}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── 최종 인사평가: 결과 대시보드 ─────────────────────────────────────────────
function FinalResultsDashboard(props) {
  var activeTargets=props.activeTargets, finalWeights=props.finalWeights, scores=props.scores;
  var progressRows=props.progressRows, assignments=props.assignments;
  var leaderCompetencies=props.leaderCompetencies, memberCompetencies=props.memberCompetencies;
  var weights=props.weights, achScores=props.achScores, achProgress=props.achProgress;
  var kpiItems=props.kpiItems, achWeights=props.achWeights, growthSelections=props.growthSelections||{};
  var selState=useState(null);
  var selEmpNo=selState[0], setSelEmpNo=selState[1];

  function getCompMax(comps){
    return comps.filter(function(c){return c.type!=="essay";}).reduce(function(a,c){return a+(c.questions?c.questions.length:0)*4;},0)
      +comps.filter(function(c){return c.type==="essay";}).reduce(function(a,c){return a+(c.maxScore||30);},0);
  }
  function getAchMax(empNo){return (kpiItems[empNo]||[]).reduce(function(a,i){return a+(i.weight||0);},0);}
  function calcFinal(empNo){
    var comps=getComps(getPerson(empNo).title,leaderCompetencies,memberCompetencies);
    var compRaw=getWeightedTotal(scores,progressRows,empNo,comps,getPersonWeights(weights,empNo));
    var compMax=getCompMax(comps);
    var compPct=(compMax&&compRaw!=null)?(compRaw/compMax*100):null;
    var achRaw=getAchWeightedTotal(achScores,achProgress,kpiItems,empNo,achWeights);
    var achMax=getAchMax(empNo);
    var achPct=(achMax&&achRaw!=null)?(achRaw/achMax*100):null;
    var fw=finalWeights[empNo]||{ach:50,comp:50};
    var fin=null;
    if(compPct!=null&&achPct!=null) fin=+(compPct*(fw.comp/100)+achPct*(fw.ach/100)).toFixed(1);
    else if(compPct!=null) fin=+compPct.toFixed(1);
    else if(achPct!=null) fin=+achPct.toFixed(1);
    var growthScore=(growthSelections[empNo]||{}).status==="완료"&&(growthSelections[empNo]||{}).score!=null?(growthSelections[empNo]||{}).score:null;
    var finalWithGrowth=fin!=null?+(fin+(growthScore||0)).toFixed(1):null;
    return {compPct:compPct!=null?+compPct.toFixed(1):null,achPct:achPct!=null?+achPct.toFixed(1):null,fin:fin,growthScore:growthScore,finalWithGrowth:finalWithGrowth,fw:fw};
  }
  var ranked=activeTargets.map(function(t){
    var res=calcFinal(t.empNo);
    return {empNo:t.empNo,name:t.name,dept:t.dept,title:t.title,compPct:res.compPct,achPct:res.achPct,fin:res.fin,growthScore:res.growthScore,finalWithGrowth:res.finalWithGrowth,fw:res.fw};
  }).sort(function(a,b){return (b.finalWithGrowth!=null?b.finalWithGrowth:-1)-(a.finalWithGrowth!=null?a.finalWithGrowth:-1);});

  var sel=ranked.find(function(r){return r.empNo===selEmpNo;})||null;

  if(sel){
    var rank=ranked.findIndex(function(r){return r.empNo===sel.empNo;})+1;
    var comps=getComps(sel.title,leaderCompetencies,memberCompetencies);
    var compMax=getCompMax(comps);
    return (
      <div className="flex flex-col h-full overflow-hidden bg-slate-950">
        <div className="shrink-0 border-b border-slate-800 bg-slate-900 px-6 py-3 flex items-center gap-3">
          <button onClick={function(){setSelEmpNo(null);}} className="text-slate-400 hover:text-slate-200 text-sm">{"← 순위 목록"}</button>
          <span className="text-slate-700">|</span>
          <span className="text-slate-300 font-semibold">{sel.name+" · "+sel.dept}</span>
          <span className="ml-auto rounded-full bg-indigo-900/40 border border-indigo-700/50 px-3 py-1 text-xs text-indigo-400 font-semibold">{"#"+rank+"위"}</span>
        </div>
        <div className="flex-1 overflow-y-auto p-6">
          <div className="max-w-4xl mx-auto space-y-4">
            <div className="grid grid-cols-4 gap-3">
              <div className="col-span-1 rounded-2xl border border-indigo-700/40 bg-slate-900 p-5 flex flex-col items-center justify-center text-center shadow-xl">
                <div className="text-xs text-indigo-400 font-semibold mb-1">최종 인사평가</div>
                <div className="text-5xl font-black text-white">{sel.finalWithGrowth!=null?sel.finalWithGrowth:"—"}</div>
                <div className="text-xs text-indigo-300 mt-1">{"/ 105점 (가산점 포함)"}</div>
                <div className="mt-1 text-xs text-indigo-400">{"역량 "+sel.fin+"점 + 성장 "+(sel.growthScore!=null?sel.growthScore:"—")+"점"}</div>
              </div>
              <div className="rounded-2xl border border-emerald-700/40 bg-slate-900 p-4 flex flex-col justify-center shadow-lg">
                <div className="text-xs text-emerald-400 font-semibold mb-1">업적평가</div>
                <div className="text-3xl font-black text-white">{sel.achPct!=null?sel.achPct:"—"}</div>
                <div className="text-xs text-emerald-400 mt-1">{"/ 100점"}</div>
                <div className="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full bg-emerald-500 rounded-full" style={{width:(sel.achPct||0)+"%"}}/>
                </div>
              </div>
              <div className="rounded-2xl border border-violet-700/40 bg-slate-900 p-4 flex flex-col justify-center shadow-lg">
                <div className="text-xs text-violet-400 font-semibold mb-1">역량평가</div>
                <div className="text-3xl font-black text-white">{sel.compPct!=null?sel.compPct:"—"}</div>
                <div className="text-xs text-violet-400 mt-1">{"/ 100점"}</div>
                <div className="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                  <div className="h-full bg-violet-500 rounded-full" style={{width:(sel.compPct||0)+"%"}}/>
                </div>
              </div>
              <div className="rounded-2xl border border-amber-700/40 bg-slate-900 p-4 flex flex-col items-center justify-center shadow-lg">
                <div className="text-xs text-amber-400 font-semibold mb-1">전체 순위</div>
                <div className="text-4xl font-black text-amber-300">{"#"+rank}</div>
                <div className="text-xs text-amber-500 mt-1">{"/ "+ranked.length+"명"}</div>
              </div>
            </div>
            <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5">
              <h3 className="text-sm font-bold text-slate-200 mb-4">역량별 점수</h3>
              <div className="space-y-3">
                {comps.map(function(comp){
                  var stageAvgs=["본인진단",...STAGES].map(function(st){
                    return getCompStageScore(scores,progressRows,sel.empNo,st,comp.title,comp.questions,comp.type==="essay");
                  }).filter(function(v){return v!=null;});
                  var avg=stageAvgs.length?+(stageAvgs.reduce(function(a,b){return a+b;},0)/stageAvgs.length).toFixed(1):null;
                  var maxV=comp.type==="essay"?(comp.maxScore||30):(comp.questions?comp.questions.length:0)*4;
                  return (
                    <div key={comp.title}>
                      <div className="flex justify-between mb-1">
                        <span className="text-xs font-semibold text-slate-200">{comp.title}</span>
                        <span className="text-xs font-bold text-violet-400">{avg!=null?(avg+"/"+maxV):"—"}</span>
                      </div>
                      <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                        <div className="h-full bg-violet-500 rounded-full" style={{width:(avg&&maxV?avg/maxV*100:0)+"%"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function dlCsv(){
    var hdr=["순위","사번","이름","부서","직위","업적(정규화)","역량(정규화)","업적가중치","역량가중치","합산점수","성장(가산점)","최종점수"];
    var rows=ranked.map(function(r,i){return [i+1,r.empNo,r.name,r.dept,r.title,r.achPct!=null?r.achPct:"-",r.compPct!=null?r.compPct:"-",r.fw.ach,r.fw.comp,r.fin!=null?r.fin:"-",r.growthScore!=null?r.growthScore:"-",r.finalWithGrowth!=null?r.finalWithGrowth:"-"];});
    var csv=[hdr,...rows].map(function(r){return r.map(function(v){return '"'+String(v)+'"';}).join(",");}).join("\n");
    var blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download="최종인사평가.csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }

  return (
    <div className="flex-1 overflow-y-auto bg-slate-900 p-6">
      <div className="max-w-4xl mx-auto space-y-4">
        <div className="flex items-center justify-between">
          <div>
            <h2 className="text-xl font-bold text-slate-100">인사평가 최종 결과</h2>
            <p className="text-xs text-slate-400 mt-1">이름 클릭 시 개인 상세 대시보드를 볼 수 있습니다.</p>
          </div>
          <Btn onClick={dlCsv}>⬇ 엑셀 다운로드</Btn>
        </div>
        <div className="rounded-2xl border border-slate-700/50 bg-slate-800 overflow-hidden shadow-xl">
          <table className="w-full text-sm">
            <thead className="bg-slate-900/60">
              <tr>{["순위","이름/부서","업적점수","역량점수","업적가중치","역량가중치","합산점수","성장(가산)","최종점수"].map(function(h){return <th key={h} className="px-4 py-3 text-left text-xs font-semibold text-slate-400">{h}</th>;})}</tr>
            </thead>
            <tbody className="divide-y divide-slate-700/30">
              {ranked.map(function(r,i){return (
                <tr key={r.empNo} onClick={function(){setSelEmpNo(r.empNo);}} className="hover:bg-indigo-900/20 cursor-pointer">
                  <td className="px-4 py-3">
                    <span className={"inline-flex items-center justify-center w-8 h-8 rounded-full font-black text-sm "+(i===0?"bg-amber-400 text-amber-900":i===1?"bg-slate-400 text-slate-900":i===2?"bg-amber-700 text-amber-100":"bg-slate-700 text-slate-300")}>{i+1}</span>
                  </td>
                  <td className="px-4 py-3">
                    <div className="font-semibold text-slate-200">{r.name}</div>
                    <div className="text-xs text-slate-500">{r.dept+" · "+r.title}</div>
                  </td>
                  <td className="px-4 py-3 text-xs font-semibold text-emerald-400">{r.achPct!=null?r.achPct:"—"}</td>
                  <td className="px-4 py-3 text-xs font-semibold text-violet-400">{r.compPct!=null?r.compPct:"—"}</td>
                  <td className="px-4 py-3 text-xs text-slate-400">{r.fw.ach+"%"}</td>
                  <td className="px-4 py-3 text-xs text-slate-400">{r.fw.comp+"%"}</td>
                  <td className="px-4 py-3 text-xs font-semibold text-slate-400">{r.fin!=null?r.fin:"—"}</td>
                  <td className="px-4 py-3 text-center">{r.growthScore!=null?<span className="text-sm font-bold text-green-400">+{r.growthScore}</span>:<span className="text-slate-600">-</span>}</td>
                  <td className="px-4 py-3">{r.finalWithGrowth!=null?<span className="text-xl font-black text-indigo-300">{r.finalWithGrowth}</span>:<span className="text-slate-600 text-xs">미집계</span>}</td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function KpiSetupView({currentUser,kpiItems,setKpiItems,kpiApproval,setKpiApproval,kpiChain,showToast,growthOptions,growthSelections,setGrowthSelections}) {
  const empNo=currentUser.empNo;
  const approval=kpiApproval[empNo]||{status:"대기중",currentStageIdx:0,history:[]};
  const [draft,setDraft]=useState((kpiItems[empNo]||[]).map(i=>({...i})));
  const [editingId,setEditingId]=useState(null);
  const [editForm,setEditForm]=useState({title:"",weight:10,desc:""});
  const [addForm,setAddForm]=useState({title:"",weight:10,desc:""});
  const [showAddForm,setShowAddForm]=useState(false);
  const totalW=draft.reduce((a,i)=>a+Number(i.weight||0),0);
  const canEdit=["대기중","작성중","반려"].includes(approval.status);
  const isSubmitted=["제출됨","컨펌중"].includes(approval.status);
  const isConfirmed=approval.status==="확정";
  const chainStages=["피평가자 제출",...KPI_CONFIRM_STAGES,"확정"];
  const currentChainIdx=isConfirmed?chainStages.length-1:
    ["대기중","작성중","반려"].includes(approval.status)?0:
    approval.currentStageIdx+1;
  const lastRejection=approval.history?.filter(h=>h.action==="반려").slice(-1)[0];
  const chainEvs=(kpiChain[empNo]||{})[KPI_CONFIRM_STAGES[approval.currentStageIdx]||""]||[];

  const startEdit=item=>{setEditingId(item.id);setEditForm({title:item.title,weight:item.weight,desc:item.desc||""}); };
  const saveEdit=id=>{
    const w=Number(editForm.weight);
    const others=draft.filter(i=>i.id!==id).reduce((a,i)=>a+Number(i.weight||0),0);
    if(!editForm.title.trim()){showToast("KPI 항목명을 입력하세요.");return;}
    if(w<1||w>30){showToast("배점은 1~30점 범위여야 합니다.");return;}
    if(others+w>100){showToast("배점 합계가 100점을 초과합니다.");return;}
    setDraft(p=>p.map(i=>i.id===id?{...i,title:editForm.title,weight:w,desc:editForm.desc}:i));
    setEditingId(null);
  };
  const addItem=()=>{
    const w=Number(addForm.weight);
    if(!addForm.title.trim()){showToast("KPI 항목명을 입력하세요.");return;}
    if(w<1||w>30){showToast("배점은 1~30점 범위여야 합니다.");return;}
    if(totalW+w>100){showToast("배점 합계가 100점을 초과합니다.");return;}
    setDraft(p=>[...p,{id:`kpi-${empNo}-${Date.now()}`,title:addForm.title,weight:w,desc:addForm.desc}]);
    setAddForm({title:"",weight:10,desc:""});setShowAddForm(false);
  };
  const removeItem=id=>setDraft(p=>p.filter(i=>i.id!==id));
  const submit=()=>{
    if(totalW!==100){showToast("배점 합계가 100점이어야 합니다.");return;}
    if(draft.length===0){showToast("KPI 항목을 1개 이상 추가하세요.");return;}
    setKpiItems(p=>({...p,[empNo]:draft}));
    setKpiApproval(p=>({...p,[empNo]:{...p[empNo],status:"제출됨",currentStageIdx:0,
      history:[...(p[empNo]?.history||[]),{stageIdx:-1,actor:empNo,action:"제출",comment:"",ts:new Date().toLocaleDateString()}]}}));
    showToast("KPI가 제출되었습니다.");
  };
  return (
    <div className="flex-1 overflow-y-auto bg-slate-800/60 p-6">
      <div className="max-w-3xl mx-auto space-y-5">
        {/* 헤더 */}
        <div className="rounded-2xl overflow-hidden shadow-sm" style={{background:"linear-gradient(135deg,#1e293b,#334155)"}}>
          <div className="px-6 py-5 text-white">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div>
                <div className="text-xs font-semibold opacity-60 mb-1">업적평가 KPI 설정</div>
                <h2 className="text-xl font-bold">{currentUser.name}</h2>
                <p className="text-sm opacity-70">{currentUser.dept} · {currentUser.title}</p>
              </div>
              <div className={`rounded-xl px-4 py-2 text-sm font-bold ${isConfirmed?"bg-green-500":approval.status==="반려"?"bg-red-500":isSubmitted?"bg-blue-500":"bg-white/20"} text-white`}>{approval.status}</div>
            </div>
            <div className="mt-4 flex items-center gap-3">
              <div className="flex-1 h-2 rounded-full bg-white/20 overflow-hidden">
                <div className="h-full rounded-full bg-slate-800 transition-all" style={{width:`${Math.min(totalW,100)}%`}}/>
              </div>
              <span className={`text-sm font-bold ${totalW===100?"text-green-400":totalW>100?"text-red-400":"text-white"}`}>{totalW}/100점</span>
            </div>
          </div>
          <div className="bg-white/10 px-6 py-3">
            <div className="flex items-center overflow-x-auto">
              {chainStages.map((stage,idx)=>{
                const isDone=idx<currentChainIdx||(isConfirmed&&idx<chainStages.length-1);
                const isCurrent=idx===currentChainIdx&&!isConfirmed;
                const isRej=approval.status==="반려"&&idx===1;
                return (
                  <React.Fragment key={stage}>
                    <div className="flex flex-col items-center shrink-0">
                      <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isRej?"bg-red-500 text-white":isDone||isConfirmed?"bg-green-400 text-white":isCurrent?"bg-white text-slate-200":"bg-white/30 text-white/60"}`}>
                        {isRej?"✗":isDone||isConfirmed?"✓":idx+1}
                      </div>
                      <div className={`mt-1 text-[9px] whitespace-nowrap font-medium ${isCurrent?"text-white":isDone||isConfirmed?"text-green-300":"text-white/50"}`}>{stage}</div>
                    </div>
                    {idx<chainStages.length-1&&<div className={`flex-1 h-0.5 min-w-3 mx-1 ${isDone||isConfirmed?"bg-green-400":"bg-white/20"}`}/>}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </div>
{approval.history?.length>0&&(
          <div className="rounded-2xl border border-slate-700/50 bg-slate-800 shadow-sm overflow-hidden">
            <div className="px-5 py-3 border-b border-slate-600/70 text-xs font-semibold text-slate-400 bg-slate-700/50">📋 컨펌 이력</div>
            <div className="divide-y divide-slate-700/30">
              {[...approval.history].reverse().map((h,i)=>(
                <div key={i} className="flex items-center gap-3 px-5 py-3">
                  <span className={`rounded-full px-2.5 py-0.5 text-[11px] font-semibold ${["컨펌","제출","재제출"].includes(h.action)?"bg-blue-900/40 text-blue-400":"bg-red-900/40 text-red-400"}`}>{h.action}</span>
                  <span className="text-sm text-slate-300">{getPerson(h.actor).name}</span>
                  {h.comment&&<span className="text-xs text-slate-400 flex-1 truncate italic">"{h.comment}"</span>}
                  <span className="text-xs text-slate-300 shrink-0">{h.ts}</span>
                </div>
              ))}
            </div>
          </div>
        )}
                {approval.status==="반려"&&lastRejection&&(
          <div className="rounded-2xl border border-red-700/50 bg-red-50 p-4 flex gap-3">
            <div className="text-red-500 text-xl shrink-0">⚠</div>
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-1"><span className="text-sm font-bold text-red-700">KPI 반려됨</span><span className="text-xs text-red-400">{lastRejection.ts} · {getPerson(lastRejection.actor).name}</span></div>
              <p className="text-sm text-red-700 leading-relaxed">{lastRejection.comment||"(반려 의견 없음)"}</p>
              <p className="mt-2 text-xs text-red-500">항목을 수정하거나 삭제한 후 다시 제출하세요.</p>
            </div>
          </div>
        )}
        {isSubmitted&&(
          <div className="rounded-2xl border border-blue-700/50 bg-blue-50 p-4 flex items-center gap-3">
            <div className="text-2xl">🔄</div>
            <div>
              <p className="text-sm font-semibold text-blue-800">컨펌 대기 중</p>
              <p className="text-xs text-blue-600 mt-0.5">현재 단계: {KPI_CONFIRM_STAGES[approval.currentStageIdx]||"-"} · 담당: {chainEvs.map(e=>getPerson(e).name).join(", ")||"-"}</p>
            </div>
          </div>
        )}
        {isConfirmed&&(
          <div className="rounded-2xl border border-green-700/50 bg-green-50 p-4 flex items-center gap-3">
            <div className="text-2xl">✅</div>
            <div><p className="text-sm font-semibold text-green-800">KPI 확정 완료</p><p className="text-xs text-green-600 mt-0.5">업적평가 탭 자기진단에서 업적 자기진단을 진행하세요.</p></div>
          </div>
        )}
        {/* KPI 항목 */}
        <div className="rounded-2xl border border-slate-700/50 bg-slate-800 shadow-sm overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-700/50 flex items-center justify-between">
            <div>
              <h3 className="text-base font-bold text-slate-200">KPI 항목</h3>
              <p className="text-[11px] text-slate-400 mt-0.5">항목별 최대 배점 30점 · 전체 합계 100점 필수</p>
            </div>
            {canEdit&&<Btn sm onClick={()=>setShowAddForm(p=>!p)}>+ 항목 추가</Btn>}
          </div>
          <div className="divide-y divide-slate-50">
            {draft.length===0&&<div className="py-10 text-center text-slate-400"><div className="text-3xl mb-2">📝</div><p className="text-sm">KPI 항목을 추가하세요</p></div>}
            {draft.map((item,idx)=>
              editingId===item.id&&canEdit?(
                <div key={item.id} className="p-4 bg-indigo-50 border-l-4 border-indigo-400">
                  <div className="text-xs font-semibold text-indigo-600 mb-3">KPI 수정 중 (최대 30점)</div>
                  <div className="grid gap-3 md:grid-cols-[1fr_120px]">
                    <input value={editForm.title} onChange={e=>setEditForm(p=>({...p,title:e.target.value}))}

                    <div className="flex items-center gap-1">
                      <input type="number" min={1} max={30} value={editForm.weight} onChange={e=>setEditForm(p=>({...p,weight:Math.min(30,Math.max(1,Number(e.target.value)))}))}
                        className="h-9 w-16 rounded-xl border border-indigo-700/50 text-center text-sm font-bold focus:outline-none bg-slate-800"/>
                      <span className="text-xs text-slate-500">/ 30점</span>
                    </div>
                  </div>
                  <input value={editForm.desc} onChange={e=>setEditForm(p=>({...p,desc:e.target.value}))}
                    placeholder="설명 (선택)" className="mt-2 h-9 w-full rounded-xl border border-indigo-700/50 px-3 text-sm focus:outline-none bg-slate-800"/>
                  <div className="mt-3 flex gap-2 justify-end"><Btn sm onClick={()=>setEditingId(null)}>취소</Btn><Btn sm primary onClick={()=>saveEdit(item.id)}>저장</Btn></div>
                </div>
              ):(
                <div key={item.id} className="flex items-center gap-4 px-5 py-4 group hover:bg-slate-700 transition">
                  <div className="w-8 h-8 rounded-full bg-indigo-900/40 text-indigo-400 flex items-center justify-center text-xs font-bold shrink-0">{idx+1}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-slate-200">{item.title}</div>
                    {item.desc&&<div className="text-xs text-slate-400 mt-0.5 truncate">{item.desc}</div>}
                  </div>
                  <div className="flex items-center gap-3 shrink-0">
                    <div className="text-right"><div className="text-lg font-black text-indigo-700">{item.weight}</div><div className="text-[10px] text-slate-400">/ 30점</div></div>
                    {canEdit&&(
                      <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                        <button onClick={()=>startEdit(item)} className="w-7 h-7 rounded-lg border border-slate-600 bg-slate-800 flex items-center justify-center text-xs text-slate-500 hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-600">✏</button>
                        <button onClick={()=>removeItem(item.id)} className="w-7 h-7 rounded-lg border border-slate-600 bg-slate-800 flex items-center justify-center text-xs text-slate-500 hover:bg-red-50 hover:border-red-700/50 hover:text-red-500">✕</button>
                      </div>
                    )}
                  </div>
                </div>
              )
            )}
            {showAddForm&&canEdit&&(
              <div className="p-4 bg-slate-900/40 border-l-4 border-slate-300">
                <div className="text-xs font-semibold text-slate-500 mb-3">새 항목 추가 (항목별 최대 30점)</div>
                <div className="grid gap-3 md:grid-cols-[1fr_120px]">
                  <input value={addForm.title} onChange={e=>setAddForm(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem()}
                    placeholder="KPI 항목명" className="h-9 rounded-xl border border-slate-600 px-3 text-sm focus:outline-none bg-slate-800"/>
                  <div className="flex items-center gap-1">
                    <input type="number" min={1} max={30} value={addForm.weight} onChange={e=>setAddForm(p=>({...p,weight:Math.min(30,Math.max(1,Number(e.target.value)))}))}
                      className="h-9 w-16 rounded-xl border border-slate-600 text-center text-sm font-bold focus:outline-none bg-slate-800"/>
                    <span className="text-xs text-slate-500">/ 30점</span>
                  </div>
                </div>
                <input value={addForm.desc} onChange={e=>setAddForm(p=>({...p,desc:e.target.value}))}
                  placeholder="설명 (선택)" className="mt-2 h-9 w-full rounded-xl border border-slate-600 px-3 text-sm focus:outline-none bg-slate-800"/>
                <div className="mt-3 flex gap-2 justify-end"><Btn sm onClick={()=>setShowAddForm(false)}>취소</Btn><Btn sm primary onClick={addItem}>추가</Btn></div>
              </div>
            )}
          </div>
          <div className="px-5 py-3 bg-slate-900/40 border-t border-slate-700/50 flex items-center justify-between">
            <span className="text-xs text-slate-400">{draft.length}개 항목</span>
            <span className={`text-sm font-bold ${totalW===100?"text-green-600":totalW>100?"text-red-600":"text-slate-600"}`}>{totalW}/100{totalW===100?" ✓":""}</span>
          </div>
        </div>
        
        {/* 성장평가 섹션 */}
        {(()=>{
          const gs=growthSelections[empNo]||{};
          const isGSS=gs.status==="제출됨"||gs.status==="완료";
          const setGS=(patch)=>setGrowthSelections(prev=>({...prev,[empNo]:{...(prev[empNo]||{}),...patch}}));

            <div className="rounded-2xl border border-indigo-700/40 bg-slate-800 p-5 shadow-xl">
              <div className="flex items-center gap-2 mb-3">
                <span className="text-lg">🌱</span>
                <h3 className="text-sm font-bold text-slate-100">성장평가 <span className="ml-1 text-xs text-indigo-400 font-normal">(가산점 : 5점)</span></h3>

                {gs.status==="제출됨"&&<span className="ml-auto text-xs text-blue-400">제출됨 · 확인 대기중</span>}

                <p className="text-sm text-slate-500 text-center py-3">관리자가 성장평가 항목을 아직 설정하지 않았습니다.<br/><span className="text-xs">관리자에게 문의하세요.</span></p>

                <div className="space-y-3">
                  <div>
                    <label className="text-xs font-semibold text-slate-400 mb-1 block">항목 선택</label>

                      onChange={e=>{const opt=growthOptions.find(o=>o.id===e.target.value);setGS({optionId:e.target.value,optionTitle:opt?.title||"",status:"작성중"});}}

                  <div className="flex items-center gap-3">

// ── 업적 평가자 뷰 (KPI 컨펌 + 업적 평가) ─────────────────────────────────────
function AchPeerEvalView({currentUser,kpiItems,kpiApproval,setKpiApproval,kpiChain,achScores,setAchScores,achProgress,setAchProgress,achAssignments,showToast,kpiSelfText,growthOptions,growthSelections,setGrowthSelections}) {
  const [subTab,setSubTab]=useState("kpiConfirm");
  const [selectedId,setSelectedId]=useState("");
  const [comment,setComment]=useState("");
  const [rejectComment,setRejectComment]=useState("");
  const [showRejectForm,setShowRejectForm]=useState(false);
  const [achSearch,setAchSearch]=useState("");

  // 내가 KPI 컨펌 체인에 있는 모든 피평가자 (단계 무관)
  const myKpiTargets=TARGETS.filter(t=>{
    const chain=kpiChain[t.empNo]||{};
    return KPI_CONFIRM_STAGES.some(s=>(chain[s]||[]).includes(currentUser.empNo));
  });
  // 현재 내 컨펌 차례인 것
  const kpiConfirmNow=myKpiTargets.map(t=>{
    const stage=getKpiConfirmStageForUser(kpiApproval,kpiChain,t.empNo,currentUser.empNo);
    return {type:"kpi",targetEmpNo:t.empNo,id:`kpi-${t.empNo}`,stage:stage||null};
  });
  const kpiConfirmTasks=kpiConfirmNow; // 전체 추적용으로 사용

  const allAchEvalTasks=TARGETS.flatMap(t=>
    ACH_EVAL_STAGES.filter(stage=>getAchEvaluators(achAssignments,t.empNo,stage).includes(currentUser.empNo))
    .map(stage=>{
      const row=getAchRow(achProgress,t.empNo,stage)||{completedBy:[],comments:{}};
      const isCompleted=(row.completedBy||[]).includes(currentUser.empNo);
      const unlocked=isAchUnlocked(achProgress,kpiApproval,t.empNo,stage,achAssignments);
      const blockReason=!isKpiConfirmed(kpiApproval,t.empNo)?"KPI 미확정":!isAchSelfDiagDone(achProgress,t.empNo)?"자기진단 대기":!unlocked?"이전 단계 대기":null;
      return {type:"ach",targetEmpNo:t.empNo,id:row.id||`${t.empNo}-업적-${stage}`,stage,row,isCompleted,unlocked,blockReason};
    })
  );
  const activeAchTasks=allAchEvalTasks.filter(t=>t.unlocked&&!t.isCompleted);
  const doneAchTasks=allAchEvalTasks.filter(t=>t.isCompleted);
  const lockedAchTasks=allAchEvalTasks.filter(t=>!t.unlocked&&!t.isCompleted);

  const kpiTaskList=myKpiTargets.map(t=>({type:"kpi",targetEmpNo:t.empNo,id:`kpi-${t.empNo}`,stage:getKpiConfirmStageForUser(kpiApproval,kpiChain,t.empNo,currentUser.empNo)}));
  const taskList=subTab==="kpiConfirm"?kpiTaskList:[...activeAchTasks,...doneAchTasks,...lockedAchTasks];
  // KPI 추적: "kpi-{empNo}" ID로 myKpiTargets에서 선택
  const kpiSelEmpNo=selectedId.startsWith("kpi-")?selectedId.slice(4):null;
  const kpiSel=kpiSelEmpNo&&myKpiTargets.find(t=>t.empNo===kpiSelEmpNo)
    ?{type:"kpi",targetEmpNo:kpiSelEmpNo,id:`kpi-${kpiSelEmpNo}`,stage:getKpiConfirmStageForUser(kpiApproval,kpiChain,kpiSelEmpNo,currentUser.empNo)}
    :null;
  const achSel=[...activeAchTasks,...doneAchTasks,...lockedAchTasks].find(t=>t.id===selectedId);
  const sel=kpiSel||achSel||(subTab==="kpiConfirm"?kpiTaskList[0]:([...activeAchTasks,...doneAchTasks,...lockedAchTasks][0]||null));
  const target=sel?getPerson(sel.targetEmpNo):null;
  const items=target?kpiItems[target.empNo]||[]:[];
  const isKpiTask=sel?.type==="kpi";
  const isReadOnly=sel?.type==="ach"&&(sel.row?.completedBy||[]).includes(currentUser.empNo);
  const isLocked=sel?.blockReason&&!isKpiTask;

  const confirmKpi=()=>{
    const {targetEmpNo}=sel;
    const appr=kpiApproval[targetEmpNo];
    const nextIdx=getNextValidIdx(kpiChain,targetEmpNo,appr.currentStageIdx);
    const isLast=nextIdx>=KPI_CONFIRM_STAGES.length;
    setKpiApproval(p=>({...p,[targetEmpNo]:{...p[targetEmpNo],status:isLast?"확정":"제출됨",currentStageIdx:nextIdx,
      history:[...(p[targetEmpNo]?.history||[]),{stageIdx:appr.currentStageIdx,actor:currentUser.empNo,action:"컨펌",comment:"",ts:new Date().toLocaleDateString()}]}}));
    if(isLast){
      setAchProgress(prev=>prev.map(r=>r.id===`${targetEmpNo}-업적-자기진단`?{...r,status:"대기중"}:r));
      setGrowthSelections(prev=>{const gs=prev[targetEmpNo]||{};if(gs.optionId&&["제출됨","작성중"].includes(gs.status)) return {...prev,[targetEmpNo]:{...gs,status:"kpi확정"}};return prev;});
    }
    showToast(`${getPerson(targetEmpNo).name}의 KPI를 컨펌했습니다.`);setSelectedId("");
  };
  const rejectKpi=()=>{
    if(!rejectComment.trim()){showToast("반려 의견을 입력해야 합니다.");return;}
    const {targetEmpNo}=sel;const appr=kpiApproval[targetEmpNo];
    setKpiApproval(p=>({...p,[targetEmpNo]:{...p[targetEmpNo],status:"반려",currentStageIdx:0,
      history:[...(p[targetEmpNo]?.history||[]),{stageIdx:appr.currentStageIdx,actor:currentUser.empNo,action:"반려",comment:rejectComment,ts:new Date().toLocaleDateString()}]}}));
    showToast(`${getPerson(targetEmpNo).name}의 KPI를 반려했습니다.`);setShowRejectForm(false);setRejectComment("");setSelectedId("");
  };
  const submitAchEval=()=>{
    if(!sel||isReadOnly) return;
    const unanswered=items.filter(i=>achScores[SKA(sel.targetEmpNo,sel.stage,currentUser.empNo,i.id)]==null);
    if(unanswered.length>0){showToast("모든 KPI에 점수를 입력해야 합니다.");return;}
    if(!comment.trim()){showToast("종합 의견을 입력해야 합니다.");return;}
    const req=getAchEvaluators(achAssignments,sel.targetEmpNo,sel.stage);
    setAchProgress(prev=>prev.map(r=>{
      if(r.id!==sel.id) return r;
      const cb=Array.from(new Set([...(r.completedBy||[]),currentUser.empNo]));
      const done=req.every(e=>cb.includes(e));
      return {...r,status:done?"완료":"작성중",progress:done?100:Math.round(cb.length/req.length*100),completedBy:cb,comments:{...(r.comments||{}),[currentUser.empNo]:comment}};
    }));
    showToast(`${target.name} 업적 ${sel.stage} 제출 완료!`);setComment("");
  };

  return (
    <div className="flex flex-1 flex-col overflow-hidden">
      {/* 서브탭 */}
      <div className="border-b border-slate-700 bg-slate-800 px-6 py-3 flex items-center gap-2">
        {[["kpiConfirm",`🔗 KPI 설정 컨펌 (${kpiConfirmTasks.length})`],["achEval",`📊 내 평가 대상 (${allAchEvalTasks.length})`]].map(([k,l])=>(
          <button key={k} onClick={()=>{setSubTab(k);setSelectedId("");setComment("");setShowRejectForm(false);}}
            className={`rounded-xl px-4 py-2 text-sm font-semibold transition ${subTab===k?"bg-slate-900 text-white":"bg-slate-800 text-slate-400 hover:bg-slate-700"}`}>{l}</button>
        ))}
      </div>
      <div className="flex flex-1 overflow-hidden">
        {/* 사이드바 */}
        <aside className="w-72 shrink-0 border-r border-slate-800 bg-slate-800 flex flex-col">

                      </div>
                    </div>
                    {!isGConfirmed&&(
                      <div className="space-y-3">
                        <p className="text-xs text-slate-400">성장 항목 달성 증거(자격증, 문서 등)를 확인하셨습니까?</p>

                        </div>
                      </div>
                    )}

                );
              })()}
              {!isKpiTask&&(
                <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl">
                  <h3 className="text-base font-bold mb-3">종합 의견</h3>
                  <textarea value={isReadOnly?(sel.row?.comments||{})[currentUser.empNo]||"":comment} onChange={isReadOnly?undefined:e=>setComment(e.target.value)} readOnly={isReadOnly} rows={4}
                    placeholder="평가 근거, 강점, 보완사항을 작성하세요."
                    className={`w-full rounded-xl border px-3 py-2.5 text-sm resize-none ${isReadOnly?"border-slate-700/50 bg-slate-900/40 cursor-default focus:outline-none":"border-slate-600 bg-white text-slate-900 focus:outline-none focus:border-indigo-500"}`}/>
                  {!isReadOnly&&<div className="mt-3 flex justify-end gap-2"><Btn onClick={()=>showToast("임시저장되었습니다.")}>💾 임시저장</Btn><Btn primary onClick={submitAchEval}>✓ 최종 제출</Btn></div>}
                  {isReadOnly&&<div className="mt-3 flex items-center justify-end gap-2 text-xs text-green-600 font-medium"><span>✓</span>제출 완료된 평가입니다</div>}
                </div>
              )}

          ):(
            <div className="flex items-center justify-center h-full text-center text-slate-400">
              <div><div className="text-4xl mb-3">📋</div><p className="text-sm">좌측에서 평가 대상을 선택하세요.</p></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [allPeople,setAllPeople] = useState(()=>PEOPLE.map(p=>({...p,empStatus:"재직"})));
  const [users,setUsers] = useState(PEOPLE.map(p=>({...p,password:"1111",mustChangePassword:true})));
  const [assignments,setAssignments] = useState(initAssignments);
  const [progressRows,setProgressRows] = useState(initProgress);
  const [leaderCompetencies,setLeaderCompetencies] = useState(INIT_LEADER_COMPETENCIES);
  const [memberCompetencies,setMemberCompetencies] = useState(INIT_MEMBER_COMPETENCIES);
  const [currentUser,setCurrentUser] = useState(null);
  const [evalTab,setEvalTab] = useState("selfDiag");
  const [scores,setScores] = useState({});
  const [essayAnswers,setEssayAnswers] = useState({}); // "targetEmpNo|compTitle" → text
  const [toast,setToast] = useState("");
  const [storageLoaded,setStorageLoaded] = useState(false);
  const [weights,setWeights] = useState({});
  // 업적평가 상태
  const [evalType,setEvalType] = useState("역량"); // "역량"|"업적"
  const [achAssignments,setAchAssignments] = useState(()=>initAchAssignments());
  const [kpiItems,setKpiItems] = useState({});
  const [kpiApproval,setKpiApproval] = useState(()=>initKpiApproval());
  const [kpiChain,setKpiChain] = useState(()=>initKpiChain());
  const [kpiSelfText,setKpiSelfText] = useState({});
  const [achScores,setAchScores] = useState({});
  const [achProgress,setAchProgress] = useState(()=>initAchievementProgress());
  const [achWeights,setAchWeights] = useState({});
  const [finalWeights,setFinalWeights] = useState({});
  const [growthOptions,setGrowthOptions] = useState([]); // 관리자가 만든 성장평가 선택지
  const [growthSelections,setGrowthSelections] = useState({}); // {empNo:{optionId,optionTitle,description,status,score,confirmedBy}}
  const [seasons,setSeasons] = useState([makeSeason(2026,"중간")]);
  const [currentSeasonId,setCurrentSeasonId] = useState("2026-중간");
  const [seasonArchive,setSeasonArchive] = useState({});
  const [adminViewSeasonId,setAdminViewSeasonId] = useState("2026-중간");

  // 모듈 레벨 _people 동기화
  useEffect(()=>{ _people = allPeople; },[allPeople]);

  // 앱 로드 시 저장 데이터 복원
  useEffect(() => {
    try {
      const ra = localStorage.getItem("hr_assignments");
      const rl = localStorage.getItem("hr_leader_comp");
      const rm = localStorage.getItem("hr_member_comp");
      const rw = localStorage.getItem("hr_weights");
      const rkc = localStorage.getItem("hr_kpi_chain");
      const raa = localStorage.getItem("hr_ach_assignments");
      const raw = localStorage.getItem("hr_ach_weights");
      const rs = localStorage.getItem("hr_seasons");
      const rc = localStorage.getItem("hr_current_season_id");
      const rx = localStorage.getItem("hr_season_archive");
      if (ra) setAssignments(JSON.parse(ra));
      if (rl) setLeaderCompetencies(JSON.parse(rl));
      if (rm) setMemberCompetencies(JSON.parse(rm));
      if (rw) setWeights(JSON.parse(rw));
      if (rkc) setKpiChain(JSON.parse(rkc));
      if (raa) setAchAssignments(JSON.parse(raa));
      if (raw) setAchWeights(JSON.parse(raw));
      if (rs) setSeasons(JSON.parse(rs));
      if (rc) { setCurrentSeasonId(rc); setAdminViewSeasonId(rc); }
      if (rx) setSeasonArchive(JSON.parse(rx));
      if (ra) {
        setToast("저장된 데이터를 불러왔습니다.");
        setTimeout(()=>setToast(""),3000);
      }
    } catch (e) {
    } finally {
      setStorageLoaded(true);
    }
  }, []);

  const activePeople = allPeople.filter(p=>p.empStatus==="재직");
  const activeTargets = activePeople.filter(p=>p.empNo.startsWith("a"));

  // 비밀번호 초기화
  const resetPassword = (empNo) => {
    setUsers(prev=>prev.map(u=>u.empNo===empNo?{...u,password:"1111",mustChangePassword:true}:u));
    showToast(`${getPerson(empNo).name}의 비밀번호가 1111로 초기화되었습니다.`);
  };
  // 임직원 상태 변경
  const updateEmpStatus = (empNo, status) => {
    setAllPeople(prev=>prev.map(p=>p.empNo===empNo?{...p,empStatus:status}:p));
    showToast(`${getPerson(empNo).name} 상태가 ${status}로 변경되었습니다.`);
  };

  // 신규 임직원 추가
  const addEmployee = (emp) => {
    if (allPeople.find(p=>p.empNo===emp.empNo)){showToast("이미 존재하는 사번입니다.");return false;}
    setAllPeople(prev=>[...prev,{...emp,empStatus:"재직"}]);
    setUsers(prev=>[...prev,{...emp,password:"1111",mustChangePassword:true}]);
    if (emp.empNo.startsWith("a")) {
      const newRows = ["본인진단",...STAGES].map(s=>({
        id:`${emp.empNo}-${s}`,targetEmpNo:emp.empNo,stage:s,
        status:s==="본인진단"?"대기중":"권한대기",progress:0,avg:"-",comment:"",completedBy:[]
      }));
      setProgressRows(prev=>[...prev,...newRows]);
      setAssignments(prev=>[...prev,{targetEmpNo:emp.empNo,"동료평가":[],"1차평가":[],"2차평가":[],"3차평가":[]}]);
    }
    showToast(`${emp.name}님이 추가되었습니다. 초기 비밀번호: 1111`);
    return true;
  };

  // 설정 내보내기 (scores/essayAnswers/progressRows/passwords 제외)
  const exportSettings = () => {
    const data = {
      _version: 1,
      _exported: new Date().toISOString(),
      hr_assignments: JSON.stringify(assignments),
      hr_leader_comp: JSON.stringify(leaderCompetencies),
      hr_member_comp: JSON.stringify(memberCompetencies),
      hr_weights: JSON.stringify(weights),
      hr_seasons: JSON.stringify(seasons),
      hr_current_season_id: currentSeasonId,
      hr_season_archive: JSON.stringify(seasonArchive),
      hr_kpi_chain: JSON.stringify(kpiChain),
      hr_ach_assignments: JSON.stringify(achAssignments),
      hr_ach_weights: JSON.stringify(achWeights),
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`메가라인_설정_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast("설정이 내보내기 되었습니다.");
  };
  const importSettings = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if(data.hr_assignments){const v=JSON.parse(data.hr_assignments);localStorage.setItem("hr_assignments",data.hr_assignments);setAssignments(v);}
        if(data.hr_leader_comp){const v=JSON.parse(data.hr_leader_comp);localStorage.setItem("hr_leader_comp",data.hr_leader_comp);setLeaderCompetencies(v);}
        if(data.hr_member_comp){const v=JSON.parse(data.hr_member_comp);localStorage.setItem("hr_member_comp",data.hr_member_comp);setMemberCompetencies(v);}
        if(data.hr_weights){const v=JSON.parse(data.hr_weights);localStorage.setItem("hr_weights",data.hr_weights);setWeights(v);}
        if(data.hr_seasons){const v=JSON.parse(data.hr_seasons);localStorage.setItem("hr_seasons",data.hr_seasons);setSeasons(v);}
        if(data.hr_current_season_id){localStorage.setItem("hr_current_season_id",data.hr_current_season_id);setCurrentSeasonId(data.hr_current_season_id);setAdminViewSeasonId(data.hr_current_season_id);}
        if(data.hr_season_archive){const v=JSON.parse(data.hr_season_archive);localStorage.setItem("hr_season_archive",data.hr_season_archive);setSeasonArchive(v);}
        if(data.hr_kpi_chain){const v=JSON.parse(data.hr_kpi_chain);localStorage.setItem("hr_kpi_chain",data.hr_kpi_chain);setKpiChain(v);}
        if(data.hr_ach_assignments){const v=JSON.parse(data.hr_ach_assignments);localStorage.setItem("hr_ach_assignments",data.hr_ach_assignments);setAchAssignments(v);}
        if(data.hr_ach_weights){const v=JSON.parse(data.hr_ach_weights);localStorage.setItem("hr_ach_weights",data.hr_ach_weights);setAchWeights(v);}
        showToast("설정을 성공적으로 가져왔습니다.");
      } catch(err) {
        showToast("파일 형식이 올바르지 않습니다.");
      }
    };
    reader.readAsText(file);
  };
  const deleteSeason = (seasonId) => {
    const isCurrentSeason = seasonId === currentSeasonId;
    setSeasons(prev=>{
      const next=prev.filter(s=>s.id!==seasonId);
      try{localStorage.setItem("hr_seasons",JSON.stringify(next));}catch(e){}
      return next;
    });
    setSeasonArchive(prev=>{
      const next={...prev};
      delete next[seasonId];
      try{localStorage.setItem("hr_season_archive",JSON.stringify(next));}catch(e){}
      return next;
    });
    // 현재 시즌 삭제 시: 남은 최신 시즌으로 전환, 없으면 기본 시즌 생성
    if(isCurrentSeason){
      setSeasons(prev=>{
        const remaining = prev.filter(s=>s.id!==seasonId);
        const next = remaining.length>0 ? remaining : [makeSeason(new Date().getFullYear(),"중간")];
        const nextId = next[next.length-1].id;
        setCurrentSeasonId(nextId);
        setAdminViewSeasonId(nextId);
        try{localStorage.setItem("hr_current_season_id",nextId);}catch(e){}
        try{localStorage.setItem("hr_seasons",JSON.stringify(next));}catch(e){}
        return next;
      });
      // 데이터도 초기화
      setAssignments(initAssignments());
      setProgressRows(initProgress());
      setScores({});
      setEssayAnswers({});
      try{localStorage.removeItem("hr_assignments");}catch(e){}
    }
    if(adminViewSeasonId===seasonId) setAdminViewSeasonId(currentSeasonId);
    showToast("시즌이 삭제되었습니다.");
  };
  const reopenSeason = (seasonId) => {
    // 아카이브에서 데이터 복원
    const archived = seasonArchive[seasonId];
    if (archived) {
      setAssignments(archived.assignments||initAssignments());
      setProgressRows(archived.progressRows||initProgress());
      setScores(archived.scores||{});
      setEssayAnswers(archived.essayAnswers||{});
      try {
        localStorage.setItem("hr_assignments", JSON.stringify(archived.assignments||[]));
      } catch(e){}
    }
    // 시즌 상태 복원
    setSeasons(prev=>{
      const next=prev.map(s=>s.id===seasonId?{...s,status:"진행중"}:s);
      try{localStorage.setItem("hr_seasons",JSON.stringify(next));}catch(e){}
      return next;
    });
    setCurrentSeasonId(seasonId);
    setAdminViewSeasonId(seasonId);
    try{localStorage.setItem("hr_current_season_id",seasonId);}catch(e){}
    showToast("시즌 마감이 해제되었습니다.");
  };
  const closeSeason = (seasonId) => {
    const archived = {assignments,progressRows,scores,essayAnswers};
    setSeasonArchive(prev=>{
      const next={...prev,[seasonId]:archived};
      try{localStorage.setItem("hr_season_archive",JSON.stringify(next));}catch(e){}
      return next;
    });
    setSeasons(prev=>{
      const next=prev.map(s=>s.id===seasonId?{...s,status:"마감"}:s);
      try{localStorage.setItem("hr_seasons",JSON.stringify(next));}catch(e){}
      return next;
    });
    showToast("시즌이 마감되었습니다.");
  };
  const startNewSeason = (year,period) => {
    const ns = makeSeason(year,period);
    setSeasons(prev=>{const next=[...prev,ns];try{localStorage.setItem("hr_seasons",JSON.stringify(next));}catch(e){}return next;});
    setCurrentSeasonId(ns.id);
    setAdminViewSeasonId(ns.id);
    try{localStorage.setItem("hr_current_season_id",ns.id);}catch(e){}
    setAssignments(initAssignments());
    setProgressRows(initProgress());
    setScores({});
    setEssayAnswers({});
    try{localStorage.removeItem("hr_assignments");localStorage.removeItem("hr_weights");}catch(e){}
  };
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3500); };
  const logout = () => { setCurrentUser(null); showToast("로그아웃되었습니다."); };

  const onEvaluatorLogin = user => {
    setCurrentUser({...user,role:"evaluator"});
    setEvalType("업적");
    setEvalTab(NO_SELF_DIAG.has(user.empNo)?"peerEval":"selfDiag");
    showToast(`${user.name}님으로 로그인되었습니다.`);
  };
  const onAdminLogin = () => {
    setCurrentUser({empNo:"admin",name:"HR 관리자",dept:"인사팀",title:"관리자",role:"admin",mustChangePassword:false});
    setEvalType("공통");
    showToast("관리자 모드로 로그인되었습니다.");
  };
  const changePassword = np => {
    setUsers(p=>p.map(u=>u.empNo===currentUser.empNo?{...u,password:np,mustChangePassword:false}:u));
    setCurrentUser(p=>({...p,password:np,mustChangePassword:false}));
    showToast("비밀번호가 변경되었습니다.");
  };

  const showSelfDiagTab = currentUser&&currentUser.role==="evaluator"&&!NO_SELF_DIAG.has(currentUser.empNo)&&activeTargets.some(t=>t.empNo===currentUser.empNo);

  if (!currentUser) return <><Toast message={toast} onClose={()=>setToast("")}/><LoginScreen users={users} activePeople={activePeople} onEvaluatorLogin={onEvaluatorLogin} onAdminLogin={onAdminLogin} seasonName={seasons.find(s=>s.id===currentSeasonId)?.name}/></>;
  if (currentUser.role==="evaluator"&&currentUser.mustChangePassword) return <><Toast message={toast} onClose={()=>setToast("")}/><PasswordChangeScreen currentUser={currentUser} onChangePassword={changePassword} onLogout={logout}/>
  </>;

  return (
    <div className="flex h-screen flex-col overflow-hidden bg-slate-900 text-slate-100">
      <Toast message={toast} onClose={()=>setToast("")}/>
      <header className="shrink-0 border-b border-slate-700 bg-slate-800">
        <div className="flex items-center justify-between px-6 py-4 gap-4 flex-wrap">
          <div>
            <p className="text-xs text-slate-400 mb-1">{(()=>{const n=seasons.find(s=>s.id===currentSeasonId)?.name||"2026년 메가라인 중간 인사평가";return n.replace("역량평가","인사평가").replace("업적평가","인사평가");})()||"2026년 메가라인 인사평가"}</p>
            <h1 className="text-xl font-bold">{currentUser.role==="admin"?("관리자 - "+(evalType==="공통"?"공통":evalType==="역량"?"역량평가":"업적평가")):((seasons.find(s=>s.id===currentSeasonId)||{year:2026,period:"중간"}).year+"년 메가라인 "+(seasons.find(s=>s.id===currentSeasonId)||{year:2026,period:"중간"}).period+" "+(evalType==="역량"?"역량평가":"업적평가")+" · "+(evalTab==="selfDiag"?(evalType==="역량"?"본인진단":"자기진단"):"타인평가"))}</h1>
            <p className="mt-0.5 text-xs text-slate-500">{currentUser.empNo} · {currentUser.name} · {currentUser.dept} · {currentUser.title}</p>
          </div>
          <div className="flex items-center gap-3">
            <div className="rounded-xl overflow-hidden bg-slate-900 px-2.5 py-1.5 shrink-0">
              <img src={LOGO} alt="MEGALINE" className="h-7 w-auto object-contain" style={{mixBlendMode:"screen"}}/>
            </div>
            {/* 성과평가 종류 토글 - 평가자 전용 */}
            {currentUser.role==="evaluator"&&(
            <div className="flex rounded-xl bg-slate-800 p-1">
              {[["업적","업적평가"],["역량","역량평가"]].map(([k,l])=>(
                <button key={k} onClick={()=>setEvalType(k)}
                  className={`rounded-lg px-3 py-2 text-xs font-semibold transition ${evalType===k?"bg-indigo-600 shadow-lg text-white":"text-slate-500"}`}>{l}</button>
              ))}
            </div>
            )}
            {/* 평가자: 본인진단/타인평가 토글 (req 3) */}
            {currentUser.role==="evaluator"&&(
              <div className="flex rounded-xl bg-slate-800 p-1">
                {showSelfDiagTab&&(
                  <button onClick={()=>setEvalTab("selfDiag")}
                    className={`rounded-lg px-4 py-2 text-xs font-semibold transition ${evalTab==="selfDiag"?"bg-indigo-600 shadow-lg text-white":"text-slate-500"}`}>
                    본인진단
                    {getRow(progressRows,currentUser.empNo,"본인진단")?.status==="완료"&&<span className="ml-1 text-green-500">✓</span>}
                  </button>
                )}
                <button onClick={()=>setEvalTab("peerEval")}
                  className={`rounded-lg px-4 py-2 text-xs font-semibold transition ${evalTab==="peerEval"?"bg-indigo-600 shadow-lg text-white":"text-slate-500"}`}>
                  타인평가
                </button>
              </div>
            )}
            {currentUser.role==="admin"&&(
              <div className="flex rounded-xl bg-slate-800 p-1">
                {[["공통","공통"],["업적","업적평가"],["역량","역량평가"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setEvalType(k)}
                    className={`rounded-lg px-3 py-2 text-xs font-semibold transition ${evalType===k?"bg-indigo-600 shadow-lg text-white":"text-slate-500"}`}>{l}</button>
                ))}
              </div>
            )}
            <Btn onClick={logout}>로그아웃</Btn>
          </div>
        </div>
      </header>

      {currentUser.role==="admin"
        ? <AdminView assignments={assignments} setAssignments={setAssignments} progressRows={progressRows} setProgressRows={setProgressRows}
            leaderCompetencies={leaderCompetencies} setLeaderCompetencies={setLeaderCompetencies}
            memberCompetencies={memberCompetencies} setMemberCompetencies={setMemberCompetencies}
            scores={scores}
            showToast={showToast}
            allPeople={allPeople} activePeople={activePeople} activeTargets={activeTargets}
            updateEmpStatus={updateEmpStatus} addEmployee={addEmployee} resetPassword={resetPassword}
            weights={weights} setWeights={setWeights}
            seasons={seasons} currentSeasonId={currentSeasonId}
            adminViewSeasonId={adminViewSeasonId} setAdminViewSeasonId={setAdminViewSeasonId}
            seasonArchive={seasonArchive}
            closeSeason={closeSeason} startNewSeason={startNewSeason} reopenSeason={reopenSeason} deleteSeason={deleteSeason}
            exportSettings={exportSettings} importSettings={importSettings}
            evalType={evalType} kpiChain={kpiChain} setKpiChain={setKpiChain}
            kpiApproval={kpiApproval} kpiItems={kpiItems} achProgress={achProgress}
            achScores={achScores} achWeights={achWeights} setAchWeights={setAchWeights}
            achAssignments={achAssignments} setAchAssignments={setAchAssignments}
            finalWeights={finalWeights} setFinalWeights={setFinalWeights}
            essayAnswers={essayAnswers}
            growthOptions={growthOptions} setGrowthOptions={setGrowthOptions}
            growthSelections={growthSelections} setGrowthSelections={setGrowthSelections}/>
        : evalType==="업적"
          ? (() => {
              const kpiConfirmed = isKpiConfirmed(kpiApproval, currentUser.empNo);
              const selfDone = isAchSelfDiagDone(achProgress, currentUser.empNo);
              const isTarget = activeTargets.some(t=>t.empNo===currentUser.empNo);
              // 피평가자 탭 (본인이 피평가자인 경우)
              if(evalTab==="selfDiag"&&showSelfDiagTab){
                if(!kpiConfirmed){
                  return <KpiSetupView currentUser={currentUser} kpiItems={kpiItems} setKpiItems={setKpiItems}
                    kpiApproval={kpiApproval} setKpiApproval={setKpiApproval} kpiChain={kpiChain} showToast={showToast}
                    growthOptions={growthOptions} growthSelections={growthSelections} setGrowthSelections={setGrowthSelections}/>;
                }
                return <AchSelfDiagView currentUser={currentUser} kpiItems={kpiItems}
                  achScores={achScores} setAchScores={setAchScores} kpiSelfText={kpiSelfText} setKpiSelfText={setKpiSelfText}
                  achProgress={achProgress} setAchProgress={setAchProgress} showToast={showToast}
                  growthOptions={growthOptions} growthSelections={growthSelections} setGrowthSelections={setGrowthSelections}/>;
              }
              // 타인평가 탭
              return <AchPeerEvalView currentUser={currentUser} kpiItems={kpiItems}
                kpiApproval={kpiApproval} setKpiApproval={setKpiApproval} kpiChain={kpiChain}
                achScores={achScores} setAchScores={setAchScores} achProgress={achProgress} setAchProgress={setAchProgress}
                achAssignments={achAssignments} showToast={showToast} kpiSelfText={kpiSelfText}
                growthOptions={growthOptions} growthSelections={growthSelections} setGrowthSelections={setGrowthSelections}/>;
            })()
          : evalTab==="selfDiag"&&showSelfDiagTab
          ? <SelfDiagView currentUser={currentUser} progressRows={progressRows} setProgressRows={setProgressRows}
              leaderCompetencies={leaderCompetencies} memberCompetencies={memberCompetencies}
              scores={scores} setScores={setScores} essayAnswers={essayAnswers} setEssayAnswers={setEssayAnswers} showToast={showToast}/>
          : <PeerEvalView currentUser={currentUser} assignments={assignments} progressRows={progressRows} setProgressRows={setProgressRows}
              leaderCompetencies={leaderCompetencies} memberCompetencies={memberCompetencies}
              scores={scores} setScores={setScores} essayAnswers={essayAnswers} setEssayAnswers={setEssayAnswers} showToast={showToast}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
