  const [comment,setComment] = useState("");

  // 내가 평가자로 배정된 모든 행 (unlock 여부, 완료 여부 관계없이)
  const allAssigned = progressRows.filter(r=>
    r.stage!=="본인진단"&&
    getEvaluators(assignments,r.targetEmpNo,r.stage).includes(currentUser.empNo)
  );
  // 완료된 행
  const doneRows    = allAssigned.filter(r=>(r.completedBy||[]).includes(currentUser.empNo));
  // unlock됐고 아직 내가 완료 안 한 행
  const activeRows  = allAssigned.filter(r=>
    isUnlocked(assignments,progressRows,r.targetEmpNo,r.stage)&&
    !(r.completedBy||[]).includes(currentUser.empNo)
  );
  // 잠긴 행(아직 내 차례 아님) — 완료 안 했고 unlock도 안 됨
  const lockedRows  = allAssigned.filter(r=>
    !isUnlocked(assignments,progressRows,r.targetEmpNo,r.stage)&&
    !(r.completedBy||[]).includes(currentUser.empNo)
  );

  // 잠긴 이유: 어느 단계가 막혀있나
  const getBlockStage = (targetEmpNo,stage) => {
    const selfRow = getRow(progressRows,targetEmpNo,"본인진단");
    if (!selfRow||selfRow.status!=="완료") return "본인진단 대기";
    const idx = STAGES.indexOf(stage);
    for (let i=0;i<idx;i++){
      const s=STAGES[i];
      if (!isStageCompleteOrSkipped(assignments,progressRows,targetEmpNo,s))
        return `${s} 진행 중`;
    }
    return "대기 중";
  };

  const searchFilter = r=>{const t=getPerson(r.targetEmpNo);return [t.empNo,t.name,t.dept,t.title,r.stage].join(" ").includes(search);};
  const filteredActive = activeRows.filter(searchFilter);
  const filteredDone   = doneRows.filter(searchFilter);
  const filteredLocked = lockedRows.filter(searchFilter);

  // 선택 가능한 행: active + done (locked는 클릭만 막음)
  const selectableRows = [...activeRows,...doneRows];
  const sel = selectableRows.find(r=>r.id===selectedId)||selectableRows[0];
  const isReadOnly = sel?(sel.completedBy||[]).includes(currentUser.empNo):false;

  const target = sel?getPerson(sel.targetEmpNo):null;
  const competencies = getComps(target?.title||"", leaderCompetencies, memberCompetencies);
  const userRank = sel?getUserRankForTarget(currentUser,assignments,sel.targetEmpNo):-1;

  // essay 분리
  const objComps = competencies.filter(c=>c.type!=="essay");
  const essayComps = competencies.filter(c=>c.type==="essay");

  // 객관식 totalQ + scoreKeys
  const objScoreKeys = sel
    ? objComps.flatMap(comp=>(comp.questions||[]).map((_,qi)=>SK(sel.targetEmpNo,sel.stage,currentUser.empNo,comp.title,qi)))
    : [];
  // 주관식 scoreKeys
  const essayScoreKeys = sel
    ? essayComps.map(comp=>SK(sel.targetEmpNo,sel.stage,currentUser.empNo,comp.title,"essay"))
    : [];

  const totalQ = objComps.reduce((s,c)=>s+(c.questions?.length||0),0) + essayComps.length;
  const answered = objScoreKeys.filter(k=>scores[k]!=null).length
    + essayScoreKeys.filter(k=>scores[k]!=null).length;
  const allScoreKeys = [...objScoreKeys,...essayScoreKeys];
  const avgScore = answered
    ? +(allScoreKeys.filter(k=>scores[k]!=null).map(k=>scores[k]).reduce((a,b)=>a+b,0)/answered).toFixed(1)
    : 0;

  const displayComment = isReadOnly ? (sel?.comment||"") : comment;
  const handleSetComment = isReadOnly ? (()=>{}) : setComment;

  const saveDraft = () => {
    if (!sel||isReadOnly) return;
    setProgressRows(prev=>prev.map(r=>r.id===sel.id?{...r,status:"작성중",progress:Math.max(r.progress,Math.round((answered/totalQ)*100)),avg:avgScore||r.avg,comment}:r));
    showToast("임시저장되었습니다.");
  };
  const submit = () => {
    if (!sel||isReadOnly) return;
    if (answered<totalQ){showToast("모든 문항을 평가해야 합니다.");return;}
    if (!comment.trim()){showToast("종합 의견을 입력해야 합니다.");return;}
    const req = getEvaluators(assignments,sel.targetEmpNo,sel.stage);
    const avg = allScoreKeys.filter(k=>scores[k]!=null).length
      ? +(allScoreKeys.filter(k=>scores[k]!=null).map(k=>scores[k]).reduce((a,b)=>a+b,0)/allScoreKeys.filter(k=>scores[k]!=null).length).toFixed(1)
      : 0;
    setProgressRows(prev=>prev.map(r=>{
      if (r.id!==sel.id) return r;
      const completedBy = Array.from(new Set([...(r.completedBy||[]),currentUser.empNo]));
      const done = req.every(e=>completedBy.includes(e));
      const comments = {...(r.comments||{}),[currentUser.empNo]:comment};
      return {...r,status:done?"완료":"작성중",progress:done?100:Math.round((completedBy.length/req.length)*100),avg:+avg.toFixed(1),comment,completedBy,comments};
    }));
    showToast(`${target.name} ${sel.stage} 제출 완료!`);
  };

  if (!allAssigned.length) return (
    <div className="flex flex-1 items-center justify-center p-12">
      <div className="text-center">
        <div className="text-5xl mb-4">📋</div>
        <h2 className="text-xl font-bold">배정된 평가 대상이 없습니다</h2>
        <p className="mt-2 text-sm text-slate-500">관리자 매칭에서 평가자로 지정되면 목록이 표시됩니다.</p>
      </div>
    </div>
  );

  return (
    <div className="flex flex-1 overflow-hidden">
      {/* 사이드바 */}
      <aside className="w-80 shrink-0 border-r border-slate-800 bg-slate-800 flex flex-col">
        <div className="p-4 border-b border-slate-700/50">
          <div className="flex items-center justify-between mb-3">
            <span className="text-sm font-semibold">내 평가 대상</span>
            <span className="rounded-full bg-slate-700/50 px-2 py-0.5 text-xs text-slate-500">{currentUser.empNo}</span>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div className="rounded-xl bg-slate-900/40 p-2 text-center"><div className="text-base font-bold text-blue-600">{activeRows.length}</div><div className="text-[10px] text-slate-500">평가가능</div></div>
            <div className="rounded-xl bg-slate-900/40 p-2 text-center"><div className="text-base font-bold text-green-600">{doneRows.length}</div><div className="text-[10px] text-slate-500">완료</div></div>
            <div className="rounded-xl bg-slate-900/40 p-2 text-center"><div className="text-base font-bold text-slate-400">{lockedRows.length}</div><div className="text-[10px] text-slate-500">대기</div></div>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름, 부서, 평가단계 검색"
            className="h-9 w-full rounded-xl border border-slate-600 px-3 text-xs focus:outline-none focus:border-indigo-500"/>
        </div>
        <div className="flex-1 overflow-y-auto p-3 space-y-1">
          {/* 평가 가능 */}
          {filteredActive.map(r=>{
            const t=getPerson(r.targetEmpNo);
            const active=sel?.id===r.id||(!selectedId&&selectableRows[0]?.id===r.id);
            return (
              <button key={r.id} onClick={()=>{setSelectedId(r.id);setComment("");}}
                className={`w-full rounded-2xl border p-3.5 text-left transition ${active?"border-slate-900 bg-slate-900 text-white":"border-slate-700/50 bg-slate-800 hover:border-slate-600"}`}>
                <div className="flex items-center justify-between gap-2">
                  <span className="text-sm font-semibold">{t.name}</span>
                  <StatusBadge status={getEffectiveStatus(assignments,progressRows,r)==="대기중"?"평가가능":getEffectiveStatus(assignments,progressRows,r)}/>
                </div>
                <div className={`mt-1 text-xs ${active?"text-slate-300":"text-slate-500"}`}>{t.dept} · {r.stage}</div>
              </button>
            );
          })}
          {/* 완료 */}
          {filteredDone.length>0&&(
            <>
              <div className="flex items-center gap-2 px-1 py-2">
                <div className="flex-1 border-t border-slate-700/50"/>
                <span className="text-[10px] font-semibold text-slate-400 whitespace-nowrap">제출 완료 ({filteredDone.length})</span>
                <div className="flex-1 border-t border-slate-700/50"/>
              </div>
              {filteredDone.map(r=>{
                const t=getPerson(r.targetEmpNo);
                const active=sel?.id===r.id;
                return (
                  <button key={r.id} onClick={()=>setSelectedId(r.id)}
                    className={`w-full rounded-2xl border p-3.5 text-left transition ${active?"border-green-700 bg-green-700 text-white":"border-green-100 bg-green-50 hover:border-green-700/50"}`}>
                    <div className="flex items-center justify-between gap-2">
                      <span className="text-sm font-semibold">{t.name}</span>
                      <span className={`text-xs font-medium ${active?"text-green-200":"text-green-600"}`}>✓ 완료</span>
                    </div>
                    <div className={`mt-1 text-xs ${active?"text-green-200":"text-green-700/70"}`}>{t.dept} · {r.stage}</div>
                  </button>
                );
              })}
            </>
          )}
          {/* 잠김 (내 차례 아님) */}
          {filteredLocked.length>0&&(
            <>
              <div className="flex items-center gap-2 px-1 py-2">
                <div className="flex-1 border-t border-slate-700/50"/>
                <span className="text-[10px] font-semibold text-slate-400 whitespace-nowrap">순서 대기 ({filteredLocked.length})</span>
                <div className="flex-1 border-t border-slate-700/50"/>
              </div>
              {filteredLocked.map(r=>{
                const t=getPerson(r.targetEmpNo);
                const blockStage=getBlockStage(r.targetEmpNo,r.stage);
                return (
                  <div key={r.id} className="w-full rounded-2xl border border-slate-700/50 bg-slate-900/40 p-3.5 opacity-60 cursor-not-allowed">
                    <div className="flex items-center justify-between gap-2">
                      <span className="text-sm font-semibold text-slate-600">{t.name}</span>
                      <StatusBadge status="권한대기"/>
                    </div>
                    <div className="mt-1 text-xs text-slate-400">{t.dept} · {r.stage}</div>
                    <div className="mt-1.5 inline-flex items-center gap-1 rounded-full bg-slate-200 px-2 py-0.5 text-[10px] text-slate-500">
                      🔒 {blockStage}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      </aside>
      {/* 메인 폼 */}
      <div className="flex-1 overflow-y-auto bg-slate-800/60 p-6">
        {sel?(
          <EvalForm targetEmpNo={sel.targetEmpNo} stage={sel.stage} evaluatorEmpNo={currentUser.empNo}
            competencies={competencies} scores={scores} setScores={setScores}
            essayAnswers={essayAnswers} setEssayAnswers={setEssayAnswers}
            comment={displayComment} setComment={handleSetComment}
            progressRows={progressRows} assignments={assignments} userRank={userRank}
            onSaveDraft={saveDraft} onSubmit={submit} isSelfDiag={false} readOnly={isReadOnly}/>
        ):(
          <div className="flex flex-1 items-center justify-center h-full">
            <div className="text-center text-slate-400">
              <div className="text-4xl mb-3">⏳</div>
              <p className="text-sm">아직 평가 가능한 순서가 아닙니다.<br/>이전 단계가 완료되면 자동으로 권한이 열립니다.</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const STAGE_DASH_CLR = {
  "본인진단":"#8b5cf6","동료평가":"#3b82f6","1차평가":"#10b981","2차평가":"#f59e0b","3차평가":"#ef4444"
};
const GRADE_MAP = (pct) => pct>=90?{label:"S",bg:"#fef3c7",tc:"#92400e"}:pct>=80?{label:"A",bg:"#dcfce7",tc:"#166534"}:pct>=70?{label:"B",bg:"#dbeafe",tc:"#1e40af"}:pct>=60?{label:"C",bg:"#fce7f3",tc:"#9d174d"}:{label:"D",bg:"#fee2e2",tc:"#991b1b"};

function RadarChart({data,labels,maxVal,size=220}) {
  const N=labels.length; if(N<3) return null;
  const cx=size/2,cy=size/2,r=size/2-38;
  const ang=i=>(Math.PI*2*i/N)-Math.PI/2;
  const pt=(i,v)=>{const ratio=Math.min((v||0)/maxVal,1);return[cx+r*ratio*Math.cos(ang(i)),cy+r*ratio*Math.sin(ang(i))]};
  const gridPts=ratio=>labels.map((_,i)=>pt(i,maxVal*ratio).join(",")).join(" ");
  const dataPts=labels.map((_,i)=>pt(i,data[i]||0).join(",")).join(" ");
  const lpt=i=>{const pad=1.3;return[cx+r*pad*Math.cos(ang(i)),cy+r*pad*Math.sin(ang(i))]};
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map(ratio=>(
        <polygon key={ratio} points={gridPts(ratio)} fill="none"
          stroke={ratio===1?"#cbd5e1":"#e2e8f0"} strokeWidth={ratio===1?"1.5":"1"}/>
      ))}
      {labels.map((_,i)=>{const[x,y]=pt(i,maxVal);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1"/>;} )}
      <polygon points={dataPts} fill="rgba(99,102,241,0.12)" stroke="#6366f1" strokeWidth="2.5" strokeLinejoin="round"/>
      {labels.map((_,i)=>{const[x,y]=pt(i,data[i]||0);return <circle key={i} cx={x} cy={y} r={4} fill="#6366f1" stroke="white" strokeWidth="2"/>;} )}
      {labels.map((label,i)=>{const[lx,ly]=lpt(i);return(
        <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
          fontSize="10" fontWeight="600" fill="#475569">{label}</text>
      );})}
    </svg>
  );
}

// ── 평가 결과 컴포넌트 ──────────────────────────────────────────────────────────
function EvaluationResults({activeTargets,progressRows,assignments,leaderCompetencies,memberCompetencies,scores,selectedResultTarget,setSelectedResultTarget,weights}) {
  const [stageFilter,setStageFilter] = useState("all");
  const [showRanking,setShowRanking] = useState(false);
  const ALL_STAGES_R = ["본인진단",...STAGES];
  const ALL_FILTER_OPTIONS = ["all",...ALL_STAGES_R,"종합결과"];

  const selTarget = activeTargets.find(t=>t.empNo===selectedResultTarget)||activeTargets[0];
  const comps = selTarget ? getComps(selTarget.title,leaderCompetencies,memberCompetencies) : [];
  const objComps = comps.filter(c=>c.type!=="essay");
  const essayComps = comps.filter(c=>c.type==="essay");

  const getStageData = (stage) => {
    if(!selTarget) return null;
    const stageRow = progressRows.find(r=>r.targetEmpNo===selTarget.empNo&&r.stage===stage);
    if(!stageRow) return null;
    const evaluators = stage==="본인진단"
      ?(stageRow.status==="완료"?[selTarget.empNo]:[])
      :(stageRow.completedBy||[]);
    if(!evaluators.length) return null;
    return {stageRow, evaluators};
  };

  const getEvScore = (stage,evNo,comp) => {
    if(comp.type==="essay"){
      return scores[SK(selTarget.empNo,stage,evNo,comp.title,"essay")]??null;
    }
    const vs=(comp.questions||[]).map((_,qi)=>scores[SK(selTarget.empNo,stage,evNo,comp.title,qi)]).filter(v=>v!=null);
    return vs.length===(comp.questions||[]).length?vs.reduce((a,b)=>a+b,0):null;
  };
  const getEvTotal = (stage,evNo) => {
    let t=0;
    for(const c of comps){
      const s=getEvScore(stage,evNo,c);
      if(s===null) return null;
      t+=s;
    }
    return t;
  };
  const getGroupAvg = (stage,evaluators,comp) => {
    const vals=evaluators.map(ev=>getEvScore(stage,ev,comp)).filter(v=>v!==null);
    return vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
  };
  const getGroupTotalAvg = (stage,evaluators) => {
    const totals=evaluators.map(ev=>getEvTotal(stage,ev)).filter(v=>v!==null);
    return totals.length?+(totals.reduce((a,b)=>a+b,0)/totals.length).toFixed(1):null;
  };

  const stageColors = {
    "본인진단":"bg-violet-50 border-violet-200 text-violet-800",
    "동료평가":"bg-blue-50 border-blue-700/50 text-blue-800",
    "1차평가":"bg-emerald-50 border-emerald-200 text-emerald-800",
    "2차평가":"bg-amber-50 border-amber-200 text-amber-800",
    "3차평가":"bg-rose-50 border-rose-200 text-rose-800",
  };
  const stageTextColors = {
    "본인진단":"text-violet-700","동료평가":"text-blue-700",
    "1차평가":"text-emerald-700","2차평가":"text-amber-700","3차평가":"text-rose-700",
  };

  const maxScore = (comp) => comp.type==="essay"?(comp.maxScore||30):(comp.questions?.length||0)*4;
  const totalMaxScore = comps.reduce((a,c)=>a+maxScore(c),0);

  const visStages = stageFilter==="종합결과" ? [] : stageFilter==="all" ? ALL_STAGES_R : [stageFilter];

  return (
    <div className="flex h-full overflow-hidden">
      {/* 좌측: 피평가자 목록 */}
      <aside className="w-64 shrink-0 border-r border-slate-800 bg-slate-900 flex flex-col overflow-hidden">
        <div className="p-4 border-b border-slate-700/50">
          <div className="flex items-center justify-between mb-2">
            <p className="text-sm font-semibold text-slate-200">피평가자 목록</p>
            <p className="text-xs text-slate-400">{activeTargets.length}명</p>
          </div>
          <button onClick={()=>setShowRanking(r=>!r)}
            className={`w-full rounded-xl px-3 py-2 text-xs font-semibold border transition ${showRanking?"bg-slate-900 text-white border-slate-900":"border-slate-600 text-slate-400 hover:bg-slate-700"}`}>
            📊 전체 순위
          </button>
        </div>
        <div className="flex-1 overflow-y-auto p-2">
          {activeTargets.map(t=>{
            const active = selTarget?.empNo===t.empNo;
            // 실제 배정된 단계만 분모로 계산
            const assignedStages = ALL_STAGES_R.filter(s=>{
              if(s==="본인진단") return true; // 본인진단은 항상 있음
              return hasEvaluator(assignments,t.empNo,s);
            });
            const completedStages = assignedStages.filter(s=>{
              const r=progressRows.find(pr=>pr.targetEmpNo===t.empNo&&pr.stage===s);
              return (r?.completedBy||[]).length>0;
            }).length;
            const totalStages = assignedStages.length;
            const isAllDone = completedStages===totalStages && totalStages>0;
            return (
              <button key={t.empNo} onClick={()=>{setSelectedResultTarget(t.empNo);setShowRanking(false);}}
                className={`w-full rounded-xl p-3 text-left transition mb-1 ${active?"bg-slate-900 text-white":"hover:bg-slate-700"}`}>
                <div className="text-sm font-semibold">{t.name}</div>
                <div className={`text-xs mt-0.5 ${active?"text-slate-300":"text-slate-500"}`}>{t.dept} · {t.title}</div>
                <div className={`text-[10px] mt-1 font-medium ${isAllDone?"text-green-500":active?"text-slate-400":"text-slate-400"}`}>
                  {isAllDone?"✓ 평가완료":`${completedStages}/${totalStages} 단계 완료`}
                </div>
              </button>
            );
          })}
        </div>
      </aside>

      {/* 우측: 상세 결과 or 순위 */}
      <div className="flex-1 overflow-y-auto bg-slate-900/40 p-5">
        {showRanking ? (()=>{
          const rankData = activeTargets.map(t=>{
            const comps=getComps(t.title,leaderCompetencies,memberCompetencies);
            const wt=getPersonWeights(weights||{},t.empNo);
            const total=getWeightedTotal(scores,progressRows,t.empNo,comps,wt);
            const maxTot=comps.filter(c=>c.type!=="essay").reduce((a,c)=>a+(c.questions?.length||0)*4,0)+comps.filter(c=>c.type==="essay").reduce((a,c)=>a+(c.maxScore||30),0);
            const pct=total!==null?+(total/maxTot*100).toFixed(1):null;
            return {t,total,maxTot,pct};
          }).sort((a,b)=>(b.total??-1)-(a.total??-1));
          const medals=["🥇","🥈","🥉"];
          return (
            <div className="max-w-4xl mx-auto">
              <div className="rounded-2xl border border-slate-700/50 bg-slate-800 overflow-hidden shadow-xl shadow-sm">
                <div className="px-5 py-4 bg-gradient-to-r from-slate-900 to-slate-700 flex items-center gap-3">
                  <span className="text-white font-bold text-base">📊 종합 평가 순위</span>
                  <span className="text-slate-400 text-xs">가중치 적용 종합점수 기준</span>
                </div>
                <div className="overflow-auto">
                  <table className="w-full text-sm">
                    <thead className="bg-slate-50 text-xs text-slate-500">
                      <tr>
                        {["순위","이름","부서 / 직위","종합점수"].map(h=><th key={h} className="px-4 py-3 text-left font-semibold">{h}</th>)}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {rankData.map(({t,total,maxTot,pct},idx)=>{
                        const grade=pct!==null?GRADE_MAP(pct):null;
                        const isTop=idx<3;
                        return (
                          <tr key={t.empNo} className={isTop?"bg-amber-50/40 hover:bg-amber-50":"hover:bg-slate-700"}>
                            <td className="px-4 py-3.5 font-bold text-lg w-16">
                              {idx<3?medals[idx]:<span className="text-slate-500 text-sm">{idx+1}</span>}
                            </td>
                            <td className="px-4 py-3.5">
                              <div className="font-semibold">{t.name}</div>
                            </td>
                            <td className="px-4 py-3.5 text-slate-500 text-xs">{t.dept} · {t.title}</td>
                            <td className="px-4 py-3.5">
                              {total!==null
                                ?<span className="font-bold text-slate-100">{total}<span className="text-slate-400 text-xs font-normal">/{maxTot}</span></span>
                                :<span className="text-slate-300 text-xs">미완료</span>}
                            </td>

                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })() : !selTarget ? (
          <div className="flex items-center justify-center h-full text-slate-400">피평가자를 선택하세요.</div>
        ) : (
          <div className="max-w-5xl mx-auto space-y-4">
            {/* 헤더 */}
            <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl flex items-center justify-between flex-wrap gap-4">
              <div>
                <h2 className="text-xl font-bold text-slate-100">{selTarget.name} 평가 결과</h2>
                <p className="text-xs text-slate-500 mt-1">{selTarget.empNo} · {selTarget.dept} · {selTarget.title}</p>
              </div>
              {/* 단계 필터 */}
              <div className="flex flex-wrap gap-1.5">
                {ALL_FILTER_OPTIONS.map(s=>(
                  <button key={s} onClick={()=>setStageFilter(s)}
                    className={`rounded-full px-3 py-1 text-xs font-semibold border transition ${stageFilter===s?"bg-slate-900 text-white border-slate-900":s==="종합결과"?"border-indigo-300 text-indigo-600 hover:bg-indigo-900/30":"border-slate-600 text-slate-400 hover:bg-slate-700"}`}>
                    {s==="all"?"전체":s}
                  </button>
                ))}
              </div>
            </div>

            {/* 종합결과 대시보드 */}
            {stageFilter==="종합결과"&&selTarget&&(()=>{
              const comps2=getComps(selTarget.title,leaderCompetencies,memberCompetencies);
              const objComps2=comps2.filter(c=>c.type!=="essay");
              const essayComps2=comps2.filter(c=>c.type==="essay");
              const maxTotal2=objComps2.reduce((a,c)=>a+(c.questions?.length||0)*4,0)+essayComps2.reduce((a,c)=>a+(c.maxScore||30),0);
              const wt=getPersonWeights(weights||{},selTarget.empNo);
              const wtSum=Object.values(wt).reduce((a,b)=>a+b,0);
              const weightedTotal=getWeightedTotal(scores,progressRows,selTarget.empNo,comps2,wt);
              const pct=weightedTotal!==null?+(weightedTotal/maxTotal2*100).toFixed(1):null;
              const grade=pct!==null?GRADE_MAP(pct):null;

              // 단계별 기여
              const stageContribs=["본인진단",...STAGES].map(st=>{
                const w=wt[st]||0;
                const evs2=st==="본인진단"
                  ?(getRow(progressRows,selTarget.empNo,"본인진단")?.status==="완료"?[selTarget.empNo]:[])
                  :(getRow(progressRows,selTarget.empNo,st)?.completedBy||[]);
                if(!evs2.length) return {st,w,groupAvg:null,contrib:null};
                const totals2=evs2.map(ev=>{let t=0,ok=true;for(const comp of comps2){if(comp.type==="essay"){const s=scores[SK(selTarget.empNo,st,ev,comp.title,"essay")];if(s==null){ok=false;break;}t+=s;}else{const vs=(comp.questions||[]).map((_,qi)=>scores[SK(selTarget.empNo,st,ev,comp.title,qi)]).filter(v=>v!=null);if(vs.length!==(comp.questions||[]).length){ok=false;break;}t+=vs.reduce((a,b)=>a+b,0);}}return ok?t:null;}).filter(v=>v!==null);
                if(!totals2.length) return {st,w,groupAvg:null,contrib:null};
                const ga=+(totals2.reduce((a,b)=>a+b,0)/totals2.length).toFixed(1);
                return {st,w,groupAvg:ga,contrib:+(ga*(w/100)).toFixed(1),maxContrib:+(maxTotal2*(w/100)).toFixed(1)};
              });

              // 역량별 가중 점수
              const compScores=objComps2.map(comp=>{
                let wsum=0;const maxComp=(comp.questions?.length||0)*4;
                for(const st of ["본인진단",...STAGES]){
                  const w=wt[st]||0;if(!w) continue;
                  const evs2=st==="본인진단"?(getRow(progressRows,selTarget.empNo,"본인진단")?.status==="완료"?[selTarget.empNo]:[]):(getRow(progressRows,selTarget.empNo,st)?.completedBy||[]);
                  if(!evs2.length) continue;
                  const st2=evs2.map(ev=>{const vs=(comp.questions||[]).map((_,qi)=>scores[SK(selTarget.empNo,st,ev,comp.title,qi)]).filter(v=>v!=null);return vs.length===(comp.questions||[]).length?vs.reduce((a,b)=>a+b,0):null;}).filter(v=>v!==null);
                  if(!st2.length) continue;
                  wsum+=st2.reduce((a,b)=>a+b,0)/st2.length*(w/100);
                }
                return {title:comp.title,category:comp.category,score:+wsum.toFixed(1),max:maxComp,pct:maxComp?+(wsum/maxComp*100).toFixed(0):0};
              });

              // 레이더 데이터
              const radarLabels=objComps2.map(c=>c.title);
              const radarData=compScores.map(c=>c.score);
              const radarMax=objComps2.length>0?(objComps2[0].questions?.length||0)*4:15;

              // 의견
              const allComments=[];
              ["본인진단",...STAGES].forEach(st=>{
                const row=getRow(progressRows,selTarget.empNo,st);if(!row) return;
                if(st==="본인진단"){if(row.comment) allComments.push({st,evNo:selTarget.empNo,comment:row.comment});}
                else{(row.completedBy||[]).forEach(evNo=>{const c=(row.comments||{})[evNo]||"";if(c) allComments.push({st,evNo,comment:c});});}
              });

              return (
                <div className="space-y-4 max-w-5xl mx-auto">
                  {wtSum!==100&&<div className="rounded-xl border border-red-700/50 bg-red-50 px-4 py-2 text-xs text-red-700 font-medium">⚠ 가중치 합계 {wtSum}% — 100%로 맞춰야 정확한 결과가 산출됩니다.</div>}

                  {/* 헤더 스코어 카드 */}
                  <div className="rounded-2xl overflow-hidden shadow-sm" style={{background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4338ca 100%)"}}>
                    <div className="px-6 py-5 flex items-center justify-between flex-wrap gap-4">
                      <div className="text-white">
                        <div className="text-xs font-semibold opacity-60 mb-1">종합 평가결과</div>
                        <div className="text-2xl font-bold">{selTarget.name}</div>
                        <div className="text-sm opacity-70 mt-0.5">{selTarget.dept} · {selTarget.title}</div>
                      </div>
                      <div className="flex items-end gap-5">
                        <div className="text-center">
                          <div className="text-5xl font-black text-white tracking-tight">{weightedTotal!==null?weightedTotal:"—"}</div>
                          <div className="text-indigo-300 text-xs mt-1">/ {maxTotal2}점</div>
                        </div>
                        {grade&&(
                          <div className="rounded-2xl px-5 py-3 text-center" style={{background:grade.bg}}>
                            <div className="text-3xl font-black" style={{color:grade.tc}}>{grade.label}</div>
                            <div className="text-xs font-semibold mt-0.5" style={{color:grade.tc}}>{pct}%</div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* 레이더 + 단계별 기여 */}
                  <div className="grid gap-4" style={{gridTemplateColumns:"240px 1fr"}}>
                    {/* 레이더 차트 */}
                    <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-4 flex flex-col items-center shadow-sm">
                      <div className="text-xs font-semibold text-slate-500 mb-3 self-start">역량 분포</div>
                      {radarLabels.length>=3
                        ?<RadarChart data={radarData} labels={radarLabels} maxVal={radarMax} size={200}/>
                        :<div className="text-slate-300 text-xs">역량 데이터 없음</div>}
                    </div>

                    {/* 단계별 기여점수 바 */}
                    <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl shadow-sm">
                      <div className="text-xs font-semibold text-slate-500 mb-4">단계별 가중치 기여점수</div>
                      <div className="space-y-3.5">
                        {stageContribs.map(({st,w,groupAvg,contrib,maxContrib})=>{
                          const clr=STAGE_DASH_CLR[st]||"#94a3b8";
                          const barPct=contrib!==null&&maxContrib?Math.round(contrib/maxContrib*100):0;
                          return (
                            <div key={st}>
                              <div className="flex items-center justify-between mb-1.5">
                                <div className="flex items-center gap-2">
                                  <div className="w-2.5 h-2.5 rounded-full" style={{background:clr}}/>
                                  <span className="text-xs font-semibold text-slate-300">{st}</span>
                                  <span className="text-[10px] text-slate-400">({w}%)</span>
                                </div>
                                <div className="flex items-center gap-2 text-xs">
                                  {groupAvg!==null
                                    ?<><span className="text-slate-500">{groupAvg}/{maxTotal2}</span><span className="font-bold" style={{color:clr}}>+{contrib}</span></>
                                    :<span className="text-slate-300">미완료</span>}
                                </div>
                              </div>
                              <div className="h-2 rounded-full bg-slate-700/50 overflow-hidden">
                                <div className="h-full rounded-full transition-all" style={{width:`${barPct}%`,background:clr}}/>
                              </div>
                            </div>
                          );
                        })}
                        <div className="pt-3 border-t border-slate-700/50 flex items-center justify-between">
                          <span className="text-xs font-bold text-slate-300">종합 합산</span>
                          <span className="text-lg font-black text-indigo-700">{weightedTotal!==null?weightedTotal:"—"}<span className="text-slate-400 text-xs font-normal">/{maxTotal2}</span></span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 역량별 점수 그리드 */}
                  {compScores.length>0&&(
                    <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5 shadow-xl shadow-sm">
                      <div className="text-xs font-semibold text-slate-500 mb-4">역량별 종합점수 (가중치 반영)</div>
                      <div className="grid gap-3" style={{gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))"}}>
                        {compScores.map(({title,category,score,max,pct:cp})=>(
                          <div key={title} className="rounded-xl border border-slate-700/50 bg-slate-900/40 p-3.5">
                            <div className="flex items-center justify-between mb-2">
                              <div>
                                <div className="text-[10px] text-slate-400 font-medium">{category}</div>
                                <div className="text-sm font-bold text-slate-200">{title}</div>
                              </div>
                              <div className="text-right">
                                <div className="text-xl font-black text-indigo-700">{score}</div>
                                <div className="text-[10px] text-slate-400">/{max}</div>
                              </div>
                            </div>
                            <div className="h-1.5 rounded-full bg-slate-200 overflow-hidden">
                              <div className="h-full rounded-full bg-indigo-500" style={{width:`${cp}%`}}/>
                            </div>
                            <div className="mt-1 text-[10px] text-right text-slate-400">{cp}%</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* 평가자별 최종 의견 */}
                  {allComments.length>0&&(
                    <div className="rounded-2xl border border-slate-700/50 bg-slate-800 overflow-hidden shadow-xl shadow-sm">
                      <div className="px-5 py-3.5 bg-slate-700/50 border-b border-slate-600/70">
                        <span className="text-sm font-bold text-slate-200">💬 평가자별 최종 의견</span>
                      </div>
                      <div className="p-5 space-y-3">
                        {allComments.map(({st,evNo,comment},i)=>{
                          const person=getPerson(evNo);
                          return (
                            <div key={i} className="rounded-xl bg-slate-900/40 p-4">
                              <div className="flex items-center gap-2 mb-2">
                                <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full border ${STAGE_BADGE[st]||"bg-slate-100 text-slate-400 border-slate-600"}`}>{st}</span>
                                <div className="w-5 h-5 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">{person.name[0]}</div>
                                <span className="text-xs font-semibold text-slate-300">{person.name}</span>
                                <span className="text-[10px] text-slate-400">{person.title}</span>
                              </div>
                              <p className="text-xs text-slate-400 leading-relaxed">{comment}</p>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* 단계별 결과 */}
            {visStages.map(stage=>{
              const sd = getStageData(stage);
              if(!sd) return (
                <div key={stage} className={`rounded-2xl border p-4 opacity-40 ${stageColors[stage]||"border-slate-600 bg-slate-800"}`}>
                  <p className={`text-sm font-semibold ${stageTextColors[stage]||"text-slate-300"}`}>{stage}</p>
                  <p className="text-xs text-slate-400 mt-1">평가 완료된 데이터가 없습니다.</p>
                </div>
              );
              const {stageRow, evaluators} = sd;
              const groupTotalAvg = getGroupTotalAvg(stage, evaluators);
              return (
                <div key={stage} className="rounded-2xl border border-slate-700/50 bg-slate-800 overflow-hidden shadow-xl shadow-sm">
                  {/* 단계 헤더 */}
                  <div className={`px-5 py-3 border-b flex items-center justify-between ${stageColors[stage]||"bg-slate-50 border-slate-600"}`}>
                    <div className="flex items-center gap-3">
                      <span className={`text-sm font-bold ${stageTextColors[stage]||"text-slate-300"}`}>{stage}</span>
                      <span className="text-xs text-slate-500">{evaluators.length}명 완료</span>
                      {evaluators.map(ev=>(
                        <span key={ev} className="rounded-full bg-white/70 border border-white/50 px-2 py-0.5 text-[10px] font-medium text-slate-300">{getPerson(ev).name}</span>
                      ))}
                    </div>
                    {groupTotalAvg!==null&&(
                      <div className="text-right">
                        <div className="text-lg font-bold text-slate-100">{groupTotalAvg}<span className="text-slate-400 text-xs font-normal">/{totalMaxScore}</span></div>
                        <div className="text-[10px] text-slate-500">그룹 총점 평균</div>
                      </div>
                    )}
                  </div>

                  {/* 점수 테이블 */}
                  <div className="overflow-auto p-4">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="border-b border-slate-700/50">
                          <th className="text-left pb-2 pr-4 font-semibold text-slate-400 w-28">역량</th>
                          <th className="text-center pb-2 px-3 font-semibold text-slate-500 bg-slate-900/40 rounded">그룹평균</th>
                          {evaluators.map(ev=>(
                            <th key={ev} className="text-center pb-2 px-3 font-semibold text-slate-300">{getPerson(ev).name}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {/* 객관식 */}
                        {objComps.map((comp,ci)=>{
                          const groupAvg=getGroupAvg(stage,evaluators,comp);
                          const mx=maxScore(comp);
                          return (
                            <tr key={comp.title} className={ci%2===0?"bg-slate-50/40":""}>
                              <td className="py-2 pr-4 font-medium text-slate-300">{comp.title}</td>
                              <td className="py-2 px-3 text-center bg-slate-900/40">
                                {groupAvg!==null?<><span className="font-bold text-slate-100">{groupAvg}</span><span className="text-slate-400 text-[10px]">/{mx}</span></>:<span className="text-slate-300">-</span>}
                              </td>
                              {evaluators.map(ev=>{
                                const sc=getEvScore(stage,ev,comp);
                                return <td key={ev} className="py-2 px-3 text-center">
                                  {sc!==null?<><span className="font-semibold text-slate-200">{sc}</span><span className="text-slate-400 text-[10px]">/{mx}</span></>:<span className="text-slate-300">-</span>}
                                </td>;
                              })}
                            </tr>
                          );
                        })}
                        {/* 서술형 */}
                        {essayComps.map(comp=>{
                          const groupAvg=getGroupAvg(stage,evaluators,comp);
                          const mx=maxScore(comp);
                          return (
                            <tr key={comp.title} className="border-t border-dashed border-violet-100">
                              <td className="py-2 pr-4 font-medium text-violet-700">✏ <span className="text-[10px]">{comp.question?.slice(0,15)||comp.title}…</span></td>
                              <td className="py-2 px-3 text-center bg-slate-900/40">
                                {groupAvg!==null?<><span className="font-bold text-violet-700">{groupAvg}</span><span className="text-slate-400 text-[10px]">/{mx}</span></>:<span className="text-slate-300">-</span>}
                              </td>
                              {evaluators.map(ev=>{
                                const sc=getEvScore(stage,ev,comp);
                                return <td key={ev} className="py-2 px-3 text-center">
                                  {sc!==null?<><span className="font-semibold text-violet-700">{sc}</span><span className="text-slate-400 text-[10px]">/{mx}</span></>:<span className="text-slate-300">-</span>}
                                </td>;
                              })}
                            </tr>
                          );
                        })}
                        {/* 총점 */}
                        <tr className="border-t-2 border-slate-600 font-semibold bg-slate-900/40">
                          <td className="py-2 pr-4 text-slate-200">총점</td>
                          <td className="py-2 px-3 text-center bg-slate-700/50">
                            {groupTotalAvg!==null?<><span className="font-bold text-slate-100">{groupTotalAvg}</span><span className="text-slate-400 text-[10px]">/{totalMaxScore}</span></>:<span className="text-slate-300">-</span>}
                          </td>
                          {evaluators.map(ev=>{
                            const total=getEvTotal(stage,ev);
                            return <td key={ev} className="py-2 px-3 text-center">
                              {total!==null?<><span className="font-bold text-slate-100">{total}</span><span className="text-slate-400 text-[10px]">/{totalMaxScore}</span></>:<span className="text-slate-300">-</span>}
                            </td>;
                          })}
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  {/* 종합 의견 */}
                  {evaluators.some(ev=>(stageRow.comments||{})[ev]||(stage==="본인진단"&&stageRow.comment))&&(
                    <div className="border-t border-slate-700/50 px-5 pb-4 pt-3">
                      <p className="text-xs font-semibold text-slate-500 mb-2">💬 종합 의견</p>
                      <div className="space-y-2">
                        {evaluators.map(ev=>{
                          const comment = stage==="본인진단"?stageRow.comment||"":(stageRow.comments||{})[ev]||"";
                          if(!comment) return null;
                          const person=getPerson(ev);
                          return (
                            <div key={ev} className="rounded-xl bg-slate-900/40 p-3">
                              <div className="flex items-center gap-1.5 mb-1">
                                <div className="w-5 h-5 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-600">{person.name[0]}</div>
                                <span className="text-xs font-semibold text-slate-300">{person.name}</span>
                                <span className="text-[10px] text-slate-400">{person.title}</span>
                              </div>
                              <p className="text-xs text-slate-400 leading-relaxed">{comment}</p>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── 관리자 뷰 ──────────────────────────────────────────────────────────────────
// ── 성장평가 관리 패널 (별도 컴포넌트) ──────────────────────────────────────
function GrowthAdminPanel({growthOptions,setGrowthOptions,growthSelections,activeTargets,showToast}) {
  const [newTitle,setNewTitle] = useState("");
  const addOpt = () => {
    if(!newTitle.trim()){showToast("항목명을 입력하세요.");return;}
    setGrowthOptions(prev=>[...prev,{id:Date.now().toString(),title:newTitle.trim()}]);
    setNewTitle("");
    showToast("성장평가 항목이 추가되었습니다.");
  };
  return (
    <div className="max-w-2xl mx-auto space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-lg font-bold text-slate-100">성장평가 관리</h2>
          <p className="text-xs text-slate-400 mt-1">피평가자가 선택할 수 있는 성장평가 항목을 설정합니다. 가산점 : 5점.</p>
        </div>
        <Btn primary onClick={()=>{try{localStorage.setItem("hr_growth_options",JSON.stringify(growthOptions));}catch(e){}showToast("저장되었습니다.");}}>💾 저장</Btn>
      </div>

          ))}
        </div>
      </div>
      <div className="rounded-2xl border border-slate-700/50 bg-slate-800 p-5">
        <p className="text-xs font-semibold text-slate-400 mb-3">피평가자별 성장평가 현황</p>
        <table className="w-full text-sm">
          <thead className="bg-slate-900/60 text-xs text-slate-400">
            <tr>{["이름","부서","선택 항목","서술","상태","점수"].map(h=><th key={h} className="px-3 py-2 text-left font-semibold">{h}</th>)}</tr>
          </thead>
          <tbody className="divide-y divide-slate-700/30">
            {activeTargets.map(t=>{
              const gs=growthSelections[t.empNo]||{};
              return (
                <tr key={t.empNo} className="hover:bg-slate-700/30">
                  <td className="px-3 py-2 font-medium text-slate-200">{t.name}</td>
                  <td className="px-3 py-2 text-xs text-slate-400">{t.dept}</td>
                  <td className="px-3 py-2 text-xs text-slate-300">{gs.optionTitle||<span className="text-slate-600">-</span>}</td>
                  <td className="px-3 py-2 text-center">{gs.description?<span className="text-green-400 text-xs">✓</span>:<span className="text-slate-600">-</span>}</td>
                  <td className="px-3 py-2">
                    <span className={"rounded-full px-2 py-0.5 text-[10px] font-semibold "+(gs.status==="완료"?"bg-green-900/40 text-green-400":gs.status==="제출됨"?"bg-blue-900/40 text-blue-400":"bg-slate-700/30 text-slate-500")}>
                      {gs.status||"미작성"}
                    </span>
                  </td>
                  <td className="px-3 py-2 text-center font-bold text-indigo-400">{gs.score!=null?gs.score+"/5":<span className="text-slate-600">-</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AdminView({assignments,setAssignments,progressRows,setProgressRows,
  leaderCompetencies,setLeaderCompetencies,memberCompetencies,setMemberCompetencies,
  scores,showToast,allPeople,activePeople,activeTargets,updateEmpStatus,addEmployee,resetPassword,
  weights,setWeights,seasons,currentSeasonId,adminViewSeasonId,setAdminViewSeasonId,seasonArchive,closeSeason,startNewSeason,reopenSeason,deleteSeason,exportSettings,importSettings,
  evalType,kpiChain,setKpiChain,kpiApproval,kpiItems,achProgress,achScores,achWeights,setAchWeights,
  achAssignments,setAchAssignments,finalWeights,setFinalWeights,essayAnswers,
  growthOptions,setGrowthOptions,growthSelections,setGrowthSelections}) {

  const [tab,setTab] = useState("employees");
  const [search,setSearch] = useState("");

  const [draftMemberComp,setDraftMemberComp] = useState(memberCompetencies);
  const [settingsLeaderDirty,setSettingsLeaderDirty] = useState(false);
  const [settingsMemberDirty,setSettingsMemberDirty] = useState(false);
  const [settingsLeaderSaveStatus,setSettingsLeaderSaveStatus] = useState("idle");
  const [settingsMemberSaveStatus,setSettingsMemberSaveStatus] = useState("idle");
  const [editComp,setEditComp] = useState(null);

  // storage 로드 후 props가 바뀌면 dirty 아닐 때만 draft 동기화
  useEffect(()=>{ if(!matchingDirty) setDraftAssignments(assignments); },[assignments]);
  useEffect(()=>{ if(!settingsLeaderDirty) setDraftLeaderComp(leaderCompetencies); },[leaderCompetencies]);
  useEffect(()=>{ if(!settingsMemberDirty) setDraftMemberComp(memberCompetencies); },[memberCompetencies]); // includes _group:"leader"|"member"

  const [draftPeople,setDraftPeople] = useState(allPeople);
  const [employeesDirty,setEmployeesDirty] = useState(false);
  const [employeesSaveStatus,setEmployeesSaveStatus] = useState("idle");

  // 미저장 경고 모달 상태
  const [warnModal,setWarnModal] = useState(null); // {from, to}
  const [selectedResultTarget,setSelectedResultTarget] = useState("");
  const [achAdminTab,setAchAdminTab] = useState("achDashboard");
  const [draftAchWeights,setDraftAchWeights] = useState(achWeights);
  const [achWDirty,setAchWDirty] = useState(false);
  const getDAW=(empNo)=>draftAchWeights[empNo]!==undefined?draftAchWeights[empNo]:{...ACH_WEIGHTS_DEFAULT};
  const updateDAW=(empNo,stage,val)=>{setDraftAchWeights(p=>({...p,[empNo]:{...getDAW(empNo),[stage]:Number(val)}}));setAchWDirty(true);};
  const getAchWSum=(empNo)=>Object.values(getDAW(empNo)).reduce((a,b)=>a+Number(b),0);
  const saveAchWeights=()=>{
    const inv=activeTargets.filter(t=>getAchWSum(t.empNo)!==100);
    if(inv.length>0){showToast(`가중치 오류: ${inv.map(t=>t.name).join(", ")}`);return;}
    setAchWeights(draftAchWeights);
    try{localStorage.setItem("hr_ach_weights",JSON.stringify(draftAchWeights));}catch(e){}
    setAchWDirty(false);showToast("업적평가 가중치가 저장되었습니다.");
  };

  const TAB_LABEL = {"matching":"평가자 매칭","settings":"평가항목 설정","employees":"임직원 관리","season":"시즌 관리","dashboard":"진행현황","results":"평가 결과"};
  const [newYear,setNewYear] = useState(new Date().getFullYear());
  const [newPeriod,setNewPeriod] = useState("중간");
  const [draftWeights,setDraftWeights] = useState(weights);
  const [weightsDirty,setWeightsDirty] = useState(false);
  const getDPW = (empNo) => draftWeights[empNo] !== undefined ? draftWeights[empNo] : {...WEIGHTS_DEFAULT};
  const updateDPW = (empNo,stage,val) => {
    setDraftWeights(prev=>({...prev,[empNo]:{...getDPW(empNo),[stage]:Number(val)}}));
    setMatchingDirty(true);
  };
  const getPersonWeightSum = (empNo) => Object.values(getDPW(empNo)).reduce((a,b)=>a+Number(b),0);
  // 조회용 데이터 (과거 시즌이면 아카이브, 현재면 현재)
  const viewData = adminViewSeasonId===currentSeasonId ? {assignments,progressRows,scores} : (seasonArchive[adminViewSeasonId]||{assignments,progressRows,scores});
  const isDirtyTab = t => (t==="matching"&&matchingDirty)||(t==="settings"&&(settingsLeaderDirty||settingsMemberDirty))||(t==="employees"&&employeesDirty)||(t==="season"&&false);

  const tryChangeTab = (to) => {
    if (tab===to) return;
    if (isDirtyTab(tab)) { setWarnModal({from:tab,to}); return; }
    doChangeTab(to);
  };
  const doChangeTab = (to) => {
    setTab(to); setSearch(""); setWarnModal(null);
  };
  const handleLeave = () => {
    const {from,to} = warnModal;
    // 미저장 draft 되돌리기
    if (from==="matching") { setDraftAssignments(assignments); setMatchingDirty(false); }
    if (from==="settings") { setDraftLeaderComp(leaderCompetencies); setDraftMemberComp(memberCompetencies); setSettingsLeaderDirty(false); setSettingsMemberDirty(false); }
    if (from==="employees") { setDraftPeople(allPeople); setEmployeesDirty(false); }
    doChangeTab(to);
  };

  // ── 저장 함수들 ──

  const saveMatchings = () => {
    // 가중치 합계 검증
    const invalidPeople = activeTargets.filter(t=>getPersonWeightSum(t.empNo)!==100);
    if(invalidPeople.length>0){
      showToast(`가중치 합계 오류: ${invalidPeople.map(t=>t.name).join(", ")} (각 100% 필요)`);
      return;
    }
    setMatchingSaveStatus("saving");
    try {
      localStorage.setItem("hr_assignments", JSON.stringify(draftAssignments));
      localStorage.setItem("hr_weights", JSON.stringify(draftWeights));
      setAssignments(draftAssignments);
      setWeights(draftWeights);
      setMatchingDirty(false);
      setWeightsDirty(false);
      setMatchingSaveStatus("saved");
      showToast("평가자 매칭 및 가중치가 저장되었습니다.");
      setTimeout(()=>setMatchingSaveStatus("idle"),2500);
    } catch(e) {
      setMatchingSaveStatus("idle");
      showToast("저장 중 오류가 발생했습니다.");
    }
  };
  const saveLeaderSettings = () => {
    setSettingsLeaderSaveStatus("saving");
    try { localStorage.setItem("hr_leader_comp", JSON.stringify(draftLeaderComp)); } catch(e){}
    setLeaderCompetencies(draftLeaderComp);
    setSettingsLeaderDirty(false);
    setSettingsLeaderSaveStatus("saved");
    showToast("리더 평가항목이 저장되었습니다.");
    setTimeout(()=>setSettingsLeaderSaveStatus("idle"),2500);
  };
  const saveMemberSettings = () => {
    setSettingsMemberSaveStatus("saving");
    try { localStorage.setItem("hr_member_comp", JSON.stringify(draftMemberComp)); } catch(e){}
    setMemberCompetencies(draftMemberComp);
    setSettingsMemberDirty(false);
    setSettingsMemberSaveStatus("saved");
    showToast("구성원 평가항목이 저장되었습니다.");
    setTimeout(()=>setSettingsMemberSaveStatus("idle"),2500);
  };
  const saveEmployees = () => {
    setEmployeesSaveStatus("saving");
    draftPeople.forEach(dp => {
      const orig = allPeople.find(p=>p.empNo===dp.empNo);
      if (orig&&orig.empStatus!==dp.empStatus) updateEmpStatus(dp.empNo,dp.empStatus);
    });
    setEmployeesDirty(false);
    setEmployeesSaveStatus("saved");
    showToast("임직원 상태가 저장되었습니다.");
    setTimeout(()=>setEmployeesSaveStatus("idle"),2500);
  };

  // ── allRows: 재직자만 필터 (req 1) ──
  const activeEmpNos = new Set(activePeople.map(p=>p.empNo));
  // 진행현황은 실제 저장된 assignments 기준
  const allRows = progressRows
    .filter(r => activeEmpNos.has(r.targetEmpNo))
    .map(r=>({
      ...r, target:getPerson(r.targetEmpNo),
      evaluatorNos: r.stage==="본인진단"?[r.targetEmpNo]:getEvaluators(assignments,r.targetEmpNo,r.stage),
      status: getEffectiveStatus(assignments,progressRows,r),
      unlocked: r.stage==="본인진단"?true:isUnlocked(assignments,progressRows,r.targetEmpNo,r.stage),
    }));
  const completed = allRows.filter(r=>r.status==="완료").length;
  const active = allRows.filter(r=>r.status==="대기중"||r.status==="작성중").length;
  const locked = allRows.filter(r=>r.status==="권한대기").length;
  const skipped = allRows.filter(r=>r.status==="해당없음").length;

  const downloadCsv = () => {
    // ── 시트1: 진행현황 ──
    const h1 = ["피평가자사번","피평가자","부서","직위","평가단계","평가자","상태","진행률","완료평가자"];
    const d1 = allRows.map(r=>[r.target.empNo,r.target.name,r.target.dept,r.target.title,r.stage,
      r.evaluatorNos.map(n=>getPerson(n).name).join(" / ")||"없음",r.status,r.progress+"%",
      (r.completedBy||[]).map(n=>getPerson(n).name).join(" / ")]);
    // ── 시트2: 평가결과 상세 ──
    const ALL_STAGES_RESULT = ["본인진단",...STAGES];
    const resultRows = [];
    const h2header = ["피평가자사번","피평가자","부서","직위","평가단계","평가자","유형"];
    const allCompsForCsv = (t) => getComps(t.title,leaderCompetencies,memberCompetencies);
    // 헤더: 역량명들 + 총점 + 종합의견
    const sampleTarget = activeTargets[0];
    const sampleComps = sampleTarget?allCompsForCsv(sampleTarget):[];
    const compHeaders = sampleComps.map(c=>c.type==="essay"?`[서술형]${c.question?.slice(0,15)||c.title}`:c.title);
    const h2 = [...h2header,...compHeaders,"총점","종합의견"];
    activeTargets.forEach(t=>{
      const comps = allCompsForCsv(t);
      ALL_STAGES_RESULT.forEach(stage=>{
        const stageRow = progressRows.find(r=>r.targetEmpNo===t.empNo&&r.stage===stage);
        if(!stageRow||(stageRow.completedBy||[]).length===0) return;
        const evaluators = stage==="본인진단"?[t.empNo]:(stageRow.completedBy||[]);
        // 그룹평균 행
        const avgRow = [t.empNo,t.name,t.dept,t.title,stage,"【그룹평균】","평균"];
        let avgTotal = 0; let avgOk = true;
        comps.forEach(comp=>{
          if(comp.type==="essay"){
            const vals=evaluators.map(ev=>scores[SK(t.empNo,stage,ev,comp.title,"essay")]).filter(v=>v!=null);
            const avg=vals.length?+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
            avgRow.push(avg!=null?avg:"-");
            if(avg!=null)avgTotal+=avg; else avgOk=false;
          } else {
            const sums=evaluators.map(ev=>{
              const vs=(comp.questions||[]).map((_,qi)=>scores[SK(t.empNo,stage,ev,comp.title,qi)]).filter(v=>v!=null);
              return vs.length===(comp.questions||[]).length?vs.reduce((a,b)=>a+b,0):null;
            }).filter(v=>v!==null);
            const avg=sums.length?+(sums.reduce((a,b)=>a+b,0)/sums.length).toFixed(1):null;
            avgRow.push(avg!=null?avg:"-");
            if(avg!=null)avgTotal+=avg; else avgOk=false;
          }
        });
        avgRow.push(avgOk?+avgTotal.toFixed(1):"-","");
        resultRows.push(avgRow);
        // 개별 평가자 행
        evaluators.forEach(evNo=>{
          const person=getPerson(evNo);
          const row=[t.empNo,t.name,t.dept,t.title,stage,person.name,"개별"];
          let total=0; let ok=true;
          comps.forEach(comp=>{
            if(comp.type==="essay"){
              const sc=scores[SK(t.empNo,stage,evNo,comp.title,"essay")];
              row.push(sc!=null?sc:"-");
              if(sc!=null)total+=sc; else ok=false;
            } else {
              const vs=(comp.questions||[]).map((_,qi)=>scores[SK(t.empNo,stage,evNo,comp.title,qi)]).filter(v=>v!=null);
              const sum=vs.length===(comp.questions||[]).length?vs.reduce((a,b)=>a+b,0):null;
              row.push(sum!=null?sum:"-");
              if(sum!=null)total+=sum; else ok=false;
            }
          });
          const comment=(stageRow.comments||{})[evNo]||stageRow.comment||"";
          row.push(ok?total:"-",comment);
          resultRows.push(row);
        });
        resultRows.push([]); // 빈줄
      });
    });
    const allData = [
      ["■ 진행현황"],...[h1,...d1].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`)),
      [],["■ 평가결과 상세"],...[h2,...resultRows].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`))
    ];
    const csv = allData.map(row=>Array.isArray(row)?row.join(","):"").join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download="2026년_메가라인_역량평가_결과.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    showToast("CSV 파일을 다운로드했습니다.");
  };

  const filteredRows = allRows.filter(r=>[r.target.empNo,r.target.name,r.target.dept,r.stage,r.status].join(" ").includes(search));
  const filteredTargets = activeTargets.filter(t=>[t.empNo,t.name,t.dept,t.title].join(" ").includes(search));

  // dirty 배지
  const DirtyDot = () => <span className="ml-1 inline-block w-1.5 h-1.5 rounded-full bg-amber-400 align-middle"/>;

  return (
    <div className="flex flex-1 flex-col overflow-hidden">
      {warnModal&&<UnsavedModal tabLabel={TAB_LABEL[warnModal.from]} onStay={()=>setWarnModal(null)} onLeave={handleLeave}/>}
      {confirmModal&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4">
          <div className="w-full max-w-sm rounded-3xl bg-slate-800 p-6 shadow-2xl">
            <div className="mb-4 flex items-start gap-3">
              <span className="text-2xl">⚠️</span>
              <p className="text-sm text-slate-300 mt-1" style={{whiteSpace:"pre-line"}}>{confirmModal.message}</p>
            </div>
            <div className="flex gap-2 justify-end mt-5">
              <Btn onClick={()=>setConfirmModal(null)}>취소</Btn>
              <button onClick={()=>{confirmModal.onConfirm();setConfirmModal(null);}}
                className="inline-flex items-center gap-1.5 rounded-xl border border-red-700/50 bg-red-50 px-4 h-9 text-sm font-medium text-red-700 hover:bg-red-100 transition">
                확인
              </button>
            </div>
          </div>
        </div>
      )}
      {editComp&&(
        <CompetencyModal competency={editComp} onClose={()=>setEditComp(null)}
          onSave={updated=>{
            if (editComp._group==="leader") {
              if (editComp._isNew) setDraftLeaderComp(p=>[...p,updated]);
              else setDraftLeaderComp(p=>p.map((c,i)=>i===editComp._idx?updated:c));
              setSettingsLeaderDirty(true);
            } else {
              if (editComp._isNew) setDraftMemberComp(p=>[...p,updated]);
              else setDraftMemberComp(p=>p.map((c,i)=>i===editComp._idx?updated:c));
              setSettingsMemberDirty(true);
            }
            setEditComp(null);
          }}/>
      )}

      {/* 탭 바 (역량평가 전용) */}
      {evalType==="역량"&&<div className="border-b border-slate-700 bg-slate-800 px-6 py-3 flex items-center gap-2 flex-wrap">
        {[["dashboard","📊 진행현황"],["matching","👤 평가자 매칭"],["settings","⚙ 평가항목 설정"],["results","📋 역량 결과"]].map(([k,l])=>(
          <button key={k} onClick={()=>tryChangeTab(k)}
            className={`rounded-xl px-4 py-2 text-sm font-semibold transition relative ${tab===k?"bg-slate-900 text-white":"bg-slate-800 text-slate-400 hover:bg-slate-700"}`}>
            {l}{isDirtyTab(k)&&<DirtyDot/>}
          </button>
        ))}
        <div className="ml-auto flex gap-2">
          <Btn onClick={downloadCsv}>⬇ 엑셀 다운로드</Btn>
          <Btn onClick={()=>showToast(`현재 평가 가능 건 ${active}건에 알림을 발송했습니다.`)}>🔔 알림 발송</Btn>
        </div>
      </div>}

        {/* 공통 탭바 */}
        {evalType==="공통"&&<div className="border-b border-slate-700 bg-slate-800 px-6 py-3 flex items-center gap-2 flex-wrap">
          {[["employees","🏢 임직원 관리"],["season","🗓 시즌 관리"],["finalWeights","⚖ 가중치 설정"],["finalResults","🏆 인사평가 결과"]].map(([k,l])=>(
            <button key={k} onClick={()=>tryChangeTab(k)}
              className={`rounded-xl px-4 py-2 text-sm font-semibold transition relative ${tab===k?"bg-slate-900 text-white":"bg-slate-800 text-slate-400 hover:bg-slate-700"}`}>
              {l}{isDirtyTab(k)&&<DirtyDot/>}
            </button>
          ))}
        </div>}
